services:
  db:
    image: mysql:8.0
    container_name: counseling_db
    restart: always
    environment:
      MYSQL_DATABASE: counseling
      MYSQL_ROOT_PASSWORD: root
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00