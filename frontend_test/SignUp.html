<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWay - 계정 관리</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* [보존] 팀장님의 기존 스타일 시트 전체 */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        :root { --primary-color: #7389f4; --bg-dark: #373f50; --text-gray: #666; --input-bg: #f5f7fb; }
        body, html { height: 100%; width: 100%; overflow: hidden; }
        .container { display: flex; height: 100vh; width: 100vw; }
        .brand-section { flex: 1; background-color: var(--bg-dark); display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; padding: 44px 36px; }
        .brand-content { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 10px; }
        .brand-section h1 { font-family: 'Cormorant Garamond', serif; font-size: 3.1rem; font-weight: 300; margin: 0; letter-spacing: 0.35em; text-transform: uppercase; color: #E5C76B; opacity: 0.95; }
        .brand-logo { display: block; width: 140px; height: auto; margin: 0 auto; object-fit: contain; opacity: 0.55; filter: brightness(0) invert(1) brightness(0.85) drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15)); }
        .brand-section p { font-size: 1.2rem; opacity: 0.8; font-weight: 400; }
        .content-section { flex: 1; background-color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 44px 40px; overflow-y: auto; }
        .form-container { width: 100%; max-width: 420px; margin: 0 auto; text-align: center; display: none; }
        .form-container.active { display: block; }
        .welcome-text { margin-bottom: 1.75rem; }
        .welcome-text h2 { font-size: 2.2rem; color: #333; margin-bottom: 0.5rem; font-weight: 700; }
        .welcome-text p { color: #999; font-size: 1.1rem; }
        .tabs { display: flex; margin-bottom: 1.1rem; border-bottom: 2px solid #eee; }
        .tab-btn { flex: 1; padding: 14px; border: none; background: none; cursor: pointer; font-size: 1.05rem; color: var(--text-gray); }
        .tab-btn.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); font-weight: 600; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        .form-group label { display: block; font-size: 0.95rem; margin-bottom: 6px; color: #555; font-weight: 600; }
        .input-group { position: relative; }
        .input-group i:not(.eye-icon) { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: #aaa; font-size: 1.1rem; }
        .eye-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #aaa; font-size: 1.1rem; z-index: 10; }
        .input-control { width: 100%; padding: 16px 46px 16px 48px; border: 1px solid #e1e5ee; border-radius: 10px; background-color: var(--input-bg); font-size: 1.05rem; outline: none; transition: all 0.2s ease; }
        .input-control:focus { border-color: #7389f4; background-color: #fff; box-shadow: 0 0 0 3px rgba(115, 137, 244, 0.1); }
        .main-btn { width: 100%; padding: 17px; background-color: var(--primary-color); color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 1.25rem; box-shadow: 0 4px 12px rgba(115, 137, 244, 0.2); }
        .footer-link { margin-top: 1.75rem; font-size: 0.95rem; color: #aaa; text-align: center; }
        .footer-link a { color: var(--primary-color); text-decoration: none; font-weight: bold; cursor: pointer; }
        .info-box { background-color: #f0f4ff; padding: 14px; border-radius: 10px; margin-bottom: 1rem; text-align: left; }
        .info-box p { font-size: 0.9rem; color: #555; }
        .hidden { display: none; }
    </style>
</head>

<body>
    <div class="container">
        <div class="brand-section">
            <div class="brand-content">
                <img src="Logo.png" alt="MindWay Logo" class="brand-logo">
                <h1>MindWay</h1>
                <p>더 나은 상담을 위한 여정의 시작.</p>
            </div>
        </div>

        <div class="content-section">
            <!-- =========================
                 로그인 (상담사/내담자 공용)
            ========================== -->
            <div id="login-view" class="form-container active">
                <div class="welcome-text">
                    <h2>Welcome</h2>
                    <p>로그인 유형을 선택해주세요</p>
                </div>

                <!-- ✅ 추가: 로그인 탭 -->
                <div class="tabs">
                    <button class="tab-btn active" id="btn-login-counselor" type="button" onclick="switchLoginTab('counselor')">상담사 로그인</button>
                    <button class="tab-btn" id="btn-login-client" type="button" onclick="switchLoginTab('client')">내담자 로그인</button>
                </div>

                <!-- 상담사 로그인 폼 (기존 로직 유지) -->
                <form id="login-counselor-form" onsubmit="handleLogin(event)">
                    <div class="input-group" style="margin-bottom: 0.9rem;">
                        <i class="fa-regular fa-user"></i>
                        <input type="email" id="loginId" class="input-control" placeholder="이메일" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="loginPassword" class="input-control" placeholder="비밀번호를 입력하세요" required>
                        <i class="fa-regular fa-eye-slash eye-icon" onclick="togglePassword('loginPassword', this)"></i>
                    </div>
                    <button type="submit" class="main-btn">Login</button>
                </form>

                <!-- ✅ 추가: 내담자 입장 폼 (phone + code) -->
                <form id="login-client-form" class="hidden" onsubmit="handleClientLogin(event)">
                    <div class="input-group" style="margin-bottom: 0.9rem;">
                        <i class="fa-solid fa-phone"></i>
                        <input type="tel" id="clientPhone" class="input-control" placeholder="전화번호 (010-0000-0000)" required>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-key"></i>
                        <input type="text" id="clientCode" class="input-control" placeholder="내담자 코드 (예: CL-0CEEC12C)" required>
                    </div>
                    <div class="info-box" style="margin-top: 0.9rem;">
                        <p>💡 안내: 내담자 코드는 등록 시 생성됩니다. 상담사가 안내한 코드를 입력하세요.</p>
                    </div>
                    <button type="submit" class="main-btn">채팅 화면으로 이동</button>
                </form>

                <div class="footer-link">
                    계정이 없으신가요? <a onclick="toggleView('signup')">회원가입/내담자 등록</a>
                </div>
            </div>

            <!-- =========================
                 회원가입 / 내담자 등록
            ========================== -->
            <div id="signup-view" class="form-container">
                <div class="welcome-text">
                    <h2>Create Account</h2>
                    <p>계정 유형을 선택해주세요</p>
                </div>

                <div class="tabs">
                    <button class="tab-btn active" id="btn-counselor" type="button" onclick="switchTab('counselor')">상담사 가입</button>
                    <button class="tab-btn" id="btn-client" type="button" onclick="switchTab('client')">내담자 등록</button>
                </div>

                <!-- 상담사 가입 -->
                <form id="counselor-form" onsubmit="handleSignup(event, 'counselor')">
                    <div class="form-group">
                        <label>로그인 ID (이메일)</label>
                        <div class="input-group">
                            <i class="fa-solid fa-envelope"></i>
                            <input type="email" class="email-input input-control" placeholder="example@mindway.com" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>비밀번호</label>
                        <div class="input-group">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" class="pwd-input input-control" placeholder="비밀번호를 입력하세요" required>
                            <i class="fa-regular fa-eye-slash eye-icon" onclick="togglePassword(null, this)"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>상담사 성함</label>
                        <div class="input-group">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" class="name-input input-control" placeholder="성함을 입력하세요" required>
                        </div>
                    </div>
                    <button type="submit" class="main-btn">상담사 가입 완료</button>
                </form>

                <!-- 내담자 등록 (명세서 기준: pwd 없음) -->
                <form id="client-form" class="hidden" onsubmit="handleSignup(event, 'client')">
                    <div class="form-group">
                        <label>연락처</label>
                        <div class="input-group">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" class="phone-input input-control" placeholder="010-0000-0000" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>내담자 성함</label>
                        <div class="input-group">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" class="name-input input-control" placeholder="성함을 입력하세요" required>
                        </div>
                    </div>
                    <div class="info-box">
                        <p>💡 안내: 내담자는 '등록'만 진행합니다. (비밀번호 없음 / 상담사 로그인 후 관리)</p>
                    </div>
                    <button type="submit" class="main-btn">내담자 등록 완료</button>
                </form>

                <div class="footer-link">
                    이미 계정이 있으신가요? <a onclick="toggleView('login')">로그인하기</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://127.0.0.1:8000';

        /* [보존] 팀장님의 유틸리티 함수 */
        function togglePassword(inputId, icon) {
            const input = inputId ? document.getElementById(inputId) : icon.parentElement.querySelector('input');
            const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
            input.setAttribute('type', type);
            icon.classList.toggle('fa-eye');
            icon.classList.toggle('fa-eye-slash');
        }

        function toggleView(view) {
            document.getElementById('login-view').classList.toggle('active', view === 'login');
            document.getElementById('signup-view').classList.toggle('active', view === 'signup');
        }

        function switchTab(type) {
            document.getElementById('counselor-form').classList.toggle('hidden', type !== 'counselor');
            document.getElementById('client-form').classList.toggle('hidden', type !== 'client');
            document.getElementById('btn-counselor').classList.toggle('active', type === 'counselor');
            document.getElementById('btn-client').classList.toggle('active', type === 'client');
        }

        /* ✅ 추가: 로그인 탭 전환 */
        function switchLoginTab(type) {
            document.getElementById('login-counselor-form').classList.toggle('hidden', type !== 'counselor');
            document.getElementById('login-client-form').classList.toggle('hidden', type !== 'client');
            document.getElementById('btn-login-counselor').classList.toggle('active', type === 'counselor');
            document.getElementById('btn-login-client').classList.toggle('active', type === 'client');
        }

        /* [핵심] 회원가입/내담자 등록 통신 로직 (명세서 기준 반영) */
        async function handleSignup(event, role) {
            event.preventDefault();
            const form = event.target;

            // 공통
            const data = {
                role: role,
                name: form.querySelector('.name-input').value
            };

            if (role === 'counselor') {
                // 상담사: email + pwd + name
                data.email = form.querySelector('.email-input').value;
                data.pwd = form.querySelector('.pwd-input').value;
            } else {
                // 내담자: phone + name (pwd 없음)
                const rawPhone = form.querySelector('.phone-input').value;
                data.phone = rawPhone.replace(/[^0-9]/g, '');
            }

            try {
                const response = await fetch(`${API_BASE_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                if (response.ok) {
                    alert(`${data.name}님, 등록이 완료되었습니다.`);
                    toggleView('login');
                } else {
                    alert('등록 실패: ' + (result.detail || '오류 발생'));
                }
            } catch (error) {
                alert('서버 연결 오류');
            }
        }

        /* [핵심] 로그인 통신 로직 (상담사 전용) */
        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginId').value;
            const pwd = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, pwd: pwd })
                });

                const result = await response.json();
                if (response.ok) {
                    alert(`${result.counselor_name || '상담사'}님, 환영합니다!`);
                    // TODO: 대시보드로 이동 (예: location.href = "dashboard.html";)
                    // location.href = "dashboard.html";
                } else {
                    alert('로그인 실패: ' + (result.detail || '오류 발생'));
                }
            } catch (error) {
                alert('서버 연결 오류');
            }
        }

        /* ✅ 추가: 내담자 로그인 (phone + code) */
        async function handleClientLogin(event) {
            event.preventDefault();
            const rawPhone = document.getElementById('clientPhone').value;
            const code = document.getElementById('clientCode').value;

            const phone = rawPhone.replace(/[^0-9]/g, '');

            try {
                const response = await fetch(`${API_BASE_URL}/client/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone: phone, code: code })
                });

                const result = await response.json();
                if (response.ok) {
                    alert(`${result.client_name || '내담자'}님, 채팅 화면으로 이동합니다.`);
                    // ✅ 채팅 화면으로 이동 (client_id 전달)
                    location.href = `chat.html?client_id=${encodeURIComponent(result.client_id)}&client_name=${encodeURIComponent(result.client_name)}`;
                } else {
                    alert('로그인 실패: ' + (result.detail || '오류 발생'));
                }
            } catch (error) {
                alert('서버 연결 오류');
            }
        }
    </script>
</body>
</html>
