<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWay - Session Report</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* 기본 스타일 가이드 유지 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            display: flex;
            background-color: #f8f9fa;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 사이드바 (Sidebar) - Main.html과 동일 --- */
        .sidebar {
            width: 280px;
            background-color: #373f50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            flex-shrink: 0;
            position: relative;
            transition: width 0.3s ease;
            overflow: hidden;
        }
        .sidebar.collapsed {
            width: 72px;
            padding: 40px 12px;
        }
        .sidebar.collapsed .sidebar-header,
        .sidebar.collapsed .sidebar-header-inner,
        .sidebar.collapsed .menu-label,
        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .nav-arrow,
        .sidebar.collapsed .btn-text {
            display: none !important;
        }
        .sidebar.collapsed .sidebar-header {
            margin-bottom: 20px;
        }
        .sidebar.collapsed .nav-item {
            justify-content: center;
            padding: 12px;
        }
        .sidebar.collapsed .settings-btn,
        .sidebar.collapsed .logout-btn {
            justify-content: center;
            padding: 15px 12px;
        }
        .sidebar-toggle {
            position: absolute;
            top: 24px;
            right: 12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background-color: #40444e;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
            transition: background-color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .sidebar-toggle:hover {
            background-color: #4a4e5a;
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            width: 100%;
        }

        .sidebar-header-inner {
            display: inline-block;
            text-align: left;
        }

        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 300;
            margin-bottom: 12px;
            padding: 0;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #E5C76B;
            opacity: 0.95;
            white-space: nowrap;
        }

        .user-profile {
            padding: 0;
            text-align: left;
            width: 100%;
        }

        .user-name {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .user-email {
            font-size: 0.75rem;
            opacity: 0.6;
        }

        .menu-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
            padding-left: 10px;
            text-transform: uppercase;
        }

        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }

        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: 0.2s;
            gap: 10px;
        }

        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .nav-item span.nav-text {
            flex: 1;
            text-align: left;
        }

        .settings-btn {
            margin-top: auto;
            display: flex;
            align-items: center;
            padding: 15px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .settings-btn:hover { color: white; }

        .logout-btn {
            margin-top: 0;
            color: #ff9a9a;
            display: flex;
            align-items: center;
            padding: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        /* --- 메인 콘텐츠 (Main.html과 동일) --- */
        .main-content {
            flex-grow: 1;
            min-width: 0;
            padding: 24px 32px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 16px;
            flex-wrap: wrap;
        }

        .header h2 {
            flex-shrink: 0;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-bar {
            position: relative;
            width: 380px;
            min-width: 0;
        }

        .search-bar input {
            width: 100%;
            padding: 14px 45px 14px 20px;
            border: 1px solid #ddd;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-bar input:focus {
            border-color: #7389f4;
        }

        .search-bar .search-icon {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #aaa;
            cursor: pointer;
            transition: color 0.2s;
        }

        .search-bar .search-icon:hover {
            color: #7389f4;
        }

        /* --- 최근 세션 목록 --- */
        .recent-session-card {
            margin-bottom: 24px;
            border-left: 4px solid #E5C76B;
        }
        .sess-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .sess-header .section-title {
            margin-bottom: 0;
        }
        .sess-filter-select {
            padding: 8px 14px;
            border-radius: 8px;
            border: 1px solid #e1e5ee;
            font-size: 0.9rem;
            color: #555;
            background: white;
            cursor: pointer;
        }

        /* --- 리포트 상세 --- */
        .report-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            min-width: 0;
            overflow: hidden;
        }

        .section-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 리스트 테이블 */
        .report-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .report-table th {
            text-align: center;
            padding: 12px;
            color: #999;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }

        .report-table td {
            text-align: center;
            padding: 15px 12px;
            border-bottom: 1px solid #f8f9fa;
        }

        .report-table tr:hover {
            background-color: #f1f3ff;
        }

        .risk-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            width: 48px;
            /* 고정 너비로 정렬 유지 */
            height: 20px;
            line-height: 1;
        }

        .high-risk {
            background: #fff5f5;
            color: #e74c3c;
        }

        .end-dropout {
            color: #e74c3c;
            font-weight: 500;
        }

        /* 상세보기 버튼 스타일 */
        .btn-view {
            background-color: #7389f4;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-view:hover {
            background-color: #5c73e0;
        }

        .btn-report {
            background-color: #373f50;
        }
        .btn-report:hover {
            background-color: #2c3442;
        }

        /* AI 리포트 상세 */
        .ai-report-view {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .report-header {
            border-bottom: 1px dashed #ddd;
            padding-bottom: 15px;
        }

        .summary-box {
            background: #f9faff;
            padding: 15px;
            border-radius: 8px;
            line-height: 1.6;
            color: #444;
        }

        .note-input {
            width: 100%;
            min-height: 120px;
            background: #fffcf0;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ffec99;
            font-style: italic;
            font-family: inherit;
            font-size: 0.9rem;
            color: #444;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
            line-height: 1.6;
        }

        .note-input:focus {
            border-color: #ffd43b;
            box-shadow: 0 0 0 3px rgba(255, 236, 153, 0.3);
        }

        /* --- 전체 대화 리스트 --- */
        .chat-history-card {
            margin-top: 0px;
        }

        .chat-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .chat-table th {
            background-color: #fcfcfc;
            padding: 12px;
            color: #666;
            border-bottom: 2px solid #eee;
            text-align: left;
        }

        .chat-table td {
            padding: 14px 12px;
            border-bottom: 1px solid #f1f1f1;
            vertical-align: top;
        }

        .speaker-badge {
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .speaker-client {
            background: #e3f2fd;
            color: #1976d2;
        }

        .speaker-counselor {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .speaker-system {
            background: #f5f5f5;
            color: #616161;
        }

        /* 신뢰도 대신 이탈 가능성 스타일 */
        .risk-score-val {
            font-family: monospace;
            font-weight: 700;
        }

        .score-high {
            color: #e74c3c;
        }

        .score-mid {
            color: #f39c12;
        }

        .score-low {
            color: #27ae60;
        }

        .risk-type-tag {
            font-size: 0.7rem;
            color: #999;
            display: block;
            margin-top: 2px;
        }

        @media (max-width: 900px) {
            .main-content {
                padding: 16px 20px;
            }
        }

        @media (max-width: 640px) {
            .main-content {
                padding: 12px 16px;
            }
            .search-bar {
                min-width: 0;
                max-width: 100%;
            }
            .section-title {
                font-size: 1rem;
            }
        }

        /* 인쇄 설정 */
        @media print {
            @page {
                size: A4;
                margin: 15mm;
            }

            body {
                background-color: white;
                display: block;
                height: auto;
                overflow: visible;
            }

            .sidebar,
            .header-right {
                display: none !important;
            }

            .main-content {
                padding: 0;
                margin: 0;
                width: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
            }

            .header {
                text-align: center;
                margin-bottom: 20px;
                width: 100%;
                justify-content: center;
            }

            .card {
                box-shadow: none !important;
                border: 1px solid #eee !important;
                margin-bottom: 30px;
                width: 100% !important;
            }

            .note-input {
                border: 1px solid #ffec99 !important;
                height: auto !important;
                min-height: auto;
                overflow: visible !important;
                white-space: pre-wrap;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>

<body>

    <aside class="sidebar" id="sidebar">
        <button type="button" class="sidebar-toggle" id="sidebarToggle" title="메뉴 접기/펼치기" aria-label="메뉴 접기">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="sidebar-header">
            <div class="sidebar-header-inner">
                <div class="brand-name">MindWay</div>
                <div class="user-profile">
                    <div class="user-name">스노우화이트 상담사</div>
                    <div class="user-email"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="3a59554f54495f5655487a5753545e4d5b4314595557">[email&#160;protected]</a></div>
                </div>
            </div>
        </div>
        <div class="menu-label">Main</div>
        <nav class="nav-menu">
            <a href="Main.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span class="nav-text">Dashboard</span>
                <i class="fa-solid fa-chevron-up nav-arrow"></i>
            </a>
            <a href="Session.html" class="nav-item active">
                <i class="fa-regular fa-user"></i>
                <span class="nav-text">Session Report</span>
                <i class="fa-solid fa-chevron-down nav-arrow"></i>
            </a>
        </nav>
        <a href="#" class="settings-btn">
            <i class="fa-solid fa-gear"></i>
            <span class="btn-text">&nbsp; Settings</span>
        </a>
        <a href="#" class="logout-btn">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            <span class="btn-text">&nbsp; Logout Account</span>
        </a>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2>Session Analysis Report</h2>
            <div class="header-right">
                <div class="search-bar">
                    <input type="text" id="searchSession" placeholder="세션ID, 채널, 진행상태, 종료사유, 만족도로 검색">
                    <i class="fa-solid fa-magnifying-glass search-icon" id="searchIcon" title="검색"></i>
                </div>
            </div>
        </header>

        <div class="card recent-session-card">
            <div class="sess-header">
                <div class="section-title">최근 세션 목록</div>
                <select class="sess-filter-select" id="sessFilter">
                    <option value="date">날짜별</option>
                    <option value="time">시간별</option>
                </select>
            </div>
            <table class="report-table">
                <thead>
                    <tr>
                        <th>세션 ID</th>
                        <th>시작 시각</th>
                        <th>채널</th>
                        <th>진행 상태</th>
                        <th>종료 사유</th>
                        <th>만족도</th>
                        <th>전체대화내용</th>
                        <th>상세보기</th>
                    </tr>
                </thead>
                <tbody id="sessionListBody">
                    <!-- sess 테이블 기반 동적 렌더링 -->
                </tbody>
            </table>
        </div>
    </main>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
        // ★ API 연동: mock 데이터 제거, 실제 DB에서 불러옴
        const API_BASE_URL = 'http://127.0.0.1:8000';
        const urlParams = new URLSearchParams(location.search);
        const counselorId = urlParams.get('counselor_id') || localStorage.getItem('counselor_id') || '';

        let sessData = []; // DB에서 불러온 세션 목록

        async function loadSessions() {
            const tbody = document.getElementById('sessionListBody');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#999;">불러오는 중...</td></tr>';
            try {
                const url = counselorId
                    ? `${API_BASE_URL}/sessions?counselor_id=${encodeURIComponent(counselorId)}&limit=100`
                    : `${API_BASE_URL}/sessions?limit=100`;
                const res = await fetch(url);
                const data = await res.json();
                sessData = data.items || [];
                renderSessionList();
            } catch (e) {
                console.error('세션 목록 로드 실패:', e);
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;color:#999;">데이터를 불러오지 못했습니다. 서버 연결을 확인해주세요.</td></tr>';
            }
        }

        function formatSessTime(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('ko-KR', { month: '2-digit', day: '2-digit' }) + ' ' +
                d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        function getFilteredSessionList() {
            const q = document.getElementById('searchSession').value.trim().toLowerCase();
            if (!q) return sessData;
            const idPart = q.replace(/^s-?/i, '');
            return sessData.filter(s => {
                const sid = String(s.id);
                const channel = s.channel.toLowerCase();
                const progressText = s.progress === 'CLOSED' ? '종료' : s.progress === 'ACTIVE' ? '진행중' : '대기';
                const endReason = (s.end_reason || '').toLowerCase();
                const satText = s.sat === true ? '만족' : s.sat === false ? '불만족' : '무응답';
                return sid.includes(idPart) || channel.includes(q) ||
                    progressText.includes(q) || s.progress.toLowerCase().includes(q) ||
                    endReason.includes(q) || (s.end_reason && s.end_reason.toLowerCase().includes(q)) ||
                    satText.includes(q);
            });
        }

        function getSortedSessionList(data) {
            const sortBy = document.getElementById('sessFilter').value;
            const arr = [...data];
            if (sortBy === 'date') {
                arr.sort((a, b) => new Date(b.start_at) - new Date(a.start_at));
            } else {
                arr.sort((a, b) => {
                    const tA = new Date(a.start_at).getTime() % (24 * 60 * 60 * 1000);
                    const tB = new Date(b.start_at).getTime() % (24 * 60 * 60 * 1000);
                    return tA - tB;
                });
            }
            return arr;
        }

        function showSessionDetail(sessionId) {
            window.open('SessionDetail.html?sess_id=' + sessionId, '_blank');
        }
        function showSessionChat(sessionId) {
            window.open('SessionChat.html?sess_id=' + sessionId, '_blank');
        }

        function renderSessionList() {
            const tbody = document.getElementById('sessionListBody');
            const filtered = getFilteredSessionList();
            const sorted = getSortedSessionList(filtered);
            tbody.innerHTML = sorted.map(s => {
                const endReasonText = s.end_reason || '-';
                const endReasonClass = s.end_reason === 'DROPOUT' ? 'end-dropout' : '';
                const satText = s.sat === true ? '만족' : s.sat === false ? '불만족' : '무응답';
                const progressText = s.progress === 'CLOSED' ? '종료' : s.progress === 'ACTIVE' ? '진행중' : '대기';
                return `<tr>
                    <td><strong>S-${s.id}</strong></td>
                    <td>${formatSessTime(s.start_at)}</td>
                    <td>${s.channel}</td>
                    <td>${progressText}</td>
                    <td><span class="${endReasonClass}">${endReasonText}</span></td>
                    <td>${satText}</td>
                    <td><button class="btn-view" onclick="showSessionChat(${s.id})">보기</button></td>
                    <td><button class="btn-view btn-report" onclick="showSessionDetail(${s.id})">리포트</button></td>
                </tr>`;
            }).join('');
        }

        // 검색 이벤트
        document.getElementById('searchSession').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                renderSessionList();
            }
        });
        document.getElementById('searchSession').addEventListener('input', function () {
            if (this.value.trim() === '') renderSessionList();
        });
        document.getElementById('searchIcon').addEventListener('click', function () {
            renderSessionList();
            document.getElementById('searchSession').focus();
        });
        document.getElementById('sessFilter').addEventListener('change', renderSessionList);

        // 사이드바 토글
        document.getElementById('sidebarToggle').addEventListener('click', function () {
            const sidebar = document.getElementById('sidebar');
            const icon = this.querySelector('i');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                icon.className = 'fa-solid fa-chevron-right';
                this.setAttribute('title', '메뉴 펼치기');
                this.setAttribute('aria-label', '메뉴 펼치기');
            } else {
                icon.className = 'fa-solid fa-chevron-left';
                this.setAttribute('title', '메뉴 접기');
                this.setAttribute('aria-label', '메뉴 접기');
            }
        });

        // ★ 페이지 로드 시 DB에서 세션 목록 가져오기
        loadSessions();
    </script>
</body>
</html>
