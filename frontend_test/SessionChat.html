<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWay - 전체 대화 내용</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        body { display: flex; background-color: #f8f9fa; height: 100vh; overflow: hidden; }

        .sidebar {
            width: 280px;
            background-color: #373f50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            flex-shrink: 0;
            position: relative;
            transition: width 0.3s ease;
            overflow: hidden;
        }
        .sidebar.collapsed { width: 72px; padding: 40px 12px; }
        .sidebar.collapsed .sidebar-header,
        .sidebar.collapsed .sidebar-header-inner,
        .sidebar.collapsed .menu-label,
        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .nav-arrow,
        .sidebar.collapsed .btn-text { display: none !important; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 12px; }
        .sidebar.collapsed .settings-btn,
        .sidebar.collapsed .logout-btn { justify-content: center; padding: 15px 12px; }
        .sidebar-toggle {
            position: absolute; top: 24px; right: 12px;
            width: 28px; height: 28px; border-radius: 50%;
            background-color: #40444e; border: 1px solid rgba(255,255,255,0.1);
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; transition: background-color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .sidebar-toggle:hover { background-color: #4a4e5a; }
        .sidebar-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; width: 100%; }
        .sidebar-header-inner { display: inline-block; text-align: left; }
        .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; margin-bottom: 12px; padding: 0; letter-spacing: 0.35em; text-transform: uppercase; color: #E5C76B; opacity: 0.95; white-space: nowrap; }
        .user-profile { padding: 0; text-align: left; width: 100%; }
        .user-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
        .user-email { font-size: 0.75rem; opacity: 0.6; }
        .menu-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 15px; padding-left: 10px; text-transform: uppercase; }
        .nav-menu { list-style: none; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; color: rgba(255,255,255,0.7); text-decoration: none; transition: 0.2s; gap: 10px; cursor: pointer; }
        .nav-item.active { background-color: rgba(255,255,255,0.1); color: white; }
        .nav-item span.nav-text { flex: 1; text-align: left; }
        .settings-btn { margin-top: auto; display: flex; align-items: center; padding: 15px; color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .settings-btn:hover { color: white; }
        .logout-btn { margin-top: 0; color: #ff9a9a; display: flex; align-items: center; padding: 15px; text-decoration: none; font-weight: 500; }

        .main-content {
            flex-grow: 1;
            min-width: 0;
            padding: 24px 32px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
        .header h2 { flex-shrink: 0; font-size: 1.5rem; }
        .btn-back {
            padding: 10px 16px;
            background: #373f50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-back:hover { background: #2c3442; }

        .chat-container {
            background: white;
            padding: 28px 36px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            max-width: 100%;
            overflow-x: auto;
            border-left: 4px solid #E5C76B;
        }
        .chat-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid #e1e5ee;
        }
        .chat-title .table-desc {
            font-size: 0.85rem;
            font-weight: 400;
            color: #888;
            margin-top: 4px;
        }
        .msg-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }
        .msg-table th {
            text-align: center;
            padding: 12px 14px;
            background: #f8f9fa;
            color: #666;
            border-bottom: 2px solid #e1e5ee;
            white-space: nowrap;
        }
        .msg-table td {
            text-align: center;
            padding: 12px 14px;
            border-bottom: 1px solid #f0f0f0;
            vertical-align: middle;
        }
        .msg-table tr:hover { background-color: #fafbff; }
        .msg-table .col-id { width: 70px; text-align: center; }
        .msg-table .col-sess { width: 80px; text-align: center; }
        .msg-table .col-speaker { width: 100px; }
        .msg-table .col-speaker-id { width: 90px; text-align: center; }
        .msg-table .col-sat { width: 80px; text-align: center; font-size: 0.85rem; }
        .msg-table .col-churn { width: 100px; text-align: center; font-size: 0.85rem; }
        .msg-table .col-churn .churn-alert {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 8px;
            background: #ffebee;
            color: #c62828;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .msg-table .col-churn .churn-alert:hover {
            background: #ffcdd2;
        }
        .msg-table .col-churn .churn-normal {
            color: #555;
        }
        .msg-table .col-stt { width: 90px; text-align: center; }
        .stt-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #7389f4 0%, #5c6fd6 100%);
            color: #fff;
            font-size: 1.35rem;
            box-shadow: 0 2px 8px rgba(92, 111, 214, 0.35);
            text-align: center;
            line-height: 1;
        }
        .msg-table .col-at { width: 160px; }
        .msg-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .msg-badge.counselor { background: #f3e5f5; color: #7b1fa2; }
        .msg-badge.client { background: #e8f5e9; color: #2e7d32; }
        .msg-badge.system { background: #e3f2fd; color: #1565c0; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .churn-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .churn-modal-overlay.show { display: flex; }
        .churn-modal-box {
            background: #fff;
            border-radius: 16px;
            padding: 24px 28px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
            text-align: center;
        }
        .churn-modal-box .churn-modal-icon {
            width: 52px; height: 52px;
            margin: 0 auto 14px;
            border-radius: 50%;
            background: #ffebee;
            color: #c62828;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .churn-modal-box .churn-modal-title { font-size: 1.05rem; font-weight: 600; color: #333; margin-bottom: 12px; }
        .churn-modal-box .churn-modal-text { font-size: 0.95rem; color: #555; line-height: 1.5; margin-bottom: 20px; }
        .churn-modal-box .btn-churn-ok {
            padding: 10px 24px;
            border-radius: 10px;
            border: none;
            background: #7389f4;
            color: #fff;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
        }
        .churn-modal-box .btn-churn-ok:hover { background: #6378e0; }
    </style>
</head>

<body>
    <aside class="sidebar" id="sidebar">
        <button type="button" class="sidebar-toggle" id="sidebarToggle" title="메뉴 접기/펼치기" aria-label="메뉴 접기">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="sidebar-header">
            <div class="sidebar-header-inner">
                <div class="brand-name">MindWay</div>
                <div class="user-profile">
                    <div class="user-name">스노우화이트 상담사</div>
                    <div class="user-email"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="5a39352f34293f3635281a3733343e2d3b2374393537">[email&#160;protected]</a></div>
                </div>
            </div>
        </div>
        <div class="menu-label">Main</div>
        <nav class="nav-menu">
            <a href="Main.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span class="nav-text">Dashboard</span>
                <i class="fa-solid fa-chevron-up nav-arrow"></i>
            </a>
            <a href="Session.html" class="nav-item active">
                <i class="fa-regular fa-user"></i>
                <span class="nav-text">Session Report</span>
                <i class="fa-solid fa-chevron-down nav-arrow"></i>
            </a>
        </nav>
        <a href="#" class="settings-btn"><i class="fa-solid fa-gear"></i><span class="btn-text">&nbsp; Settings</span></a>
        <a href="#" class="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i><span class="btn-text">&nbsp; Logout Account</span></a>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2 id="pageTitle">전체 대화 내용</h2>
            <a href="Session.html" class="btn-back">
                <i class="fa-solid fa-arrow-left"></i> 목록으로
            </a>
        </header>

        <div id="chatContent" class="chat-container">
            <!-- msg 테이블 기반 대화 내용 -->
        </div>

        <div class="churn-modal-overlay" id="churnModalOverlay">
            <div class="churn-modal-box">
                <div class="churn-modal-icon"><i class="fa-solid fa-triangle-exclamation"></i></div>
                <div class="churn-modal-title">이탈 신호 안내</div>
                <div class="churn-modal-text">내담자의 상담 이탈률이 높습니다.<br>상담사의 조치가 필요합니다!</div>
                <button type="button" class="btn-churn-ok" id="churnModalConfirm">확인</button>
            </div>
        </div>
    </main>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
        // ★ API 연동: mock 데이터 제거, 실제 DB에서 불러옴
        const API_BASE_URL = 'http://127.0.0.1:8000';

        const speakerKo = { COUNSELOR: '상담사', CLIENT: '내담자', SYSTEM: '시스템' };

        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }) + ' ' +
                d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function getSttEmoji(conf) {
            const c = Number(conf);
            if (c >= 0.95) return '😊';
            if (c >= 0.85) return '🙂';
            if (c >= 0.7) return '😐';
            return '😕';
        }

        async function renderChat(sessId) {
            document.getElementById('pageTitle').innerText = '세션 S-' + sessId + ' 전체 대화 내용';
            const container = document.getElementById('chatContent');
            container.innerHTML = '<div class="empty-state"><p>불러오는 중...</p></div>';

            try {
                // ★ 3개 API 병렬 호출: 메시지 / 알림(이탈신호) / 세션 대시보드(만족도)
                const [msgRes, alertRes, dashRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/sessions/${sessId}/messages?limit=200`),
                    fetch(`${API_BASE_URL}/sessions/${sessId}/alerts?limit=200`),
                    fetch(`${API_BASE_URL}/sessions/${sessId}/dashboard`)
                ]);
                const items = ((await msgRes.json()).items || []).sort((a, b) => new Date(a.at) - new Date(b.at));
                const alertItems = (await alertRes.json()).items || [];
                const dash = await dashRes.json();

                // 만족도 텍스트 변환 (sess.sat: 1=만족, 0=불만족, null=무응답)
                const satRaw = dash.session?.sat;
                const satText = satRaw === 1 || satRaw === true ? '만족'
                              : satRaw === 0 || satRaw === false ? '불만족' : '무응답';

                // ★ 메시지별 이탈 신호 강도: alert.msg_id 기준으로 최대 score 매핑
                const msgAlertMap = {};
                alertItems.forEach(a => {
                    const prev = msgAlertMap[a.msg_id] || 0;
                    const cur = parseFloat(a.score) || 0;
                    if (cur > prev) msgAlertMap[a.msg_id] = cur;
                });

                if (items.length === 0) {
                    container.innerHTML = '<div class="empty-state"><p>해당 세션의 대화 내용이 없습니다.</p></div>';
                    return;
                }

                container.innerHTML = `
                    <div class="chat-title">
                        <i class="fa-solid fa-database"></i> 메시지
                        <div class="table-desc">상담사와 내담자의 상담채팅 대화내용을 아래 리스트에 표시합니다. 만족인지 불만족인지 세션별로 표시됩니다.</div>
                    </div>
                    <table class="msg-table">
                        <thead>
                            <tr>
                                <th class="col-id">메시지 고유 번호</th>
                                <th class="col-sess">세션 ID</th>
                                <th class="col-speaker">발화자 유형</th>
                                <th class="col-speaker-id">발화자 ID</th>
                                <th>메시지 텍스트</th>
                                <th class="col-sat">만족도</th>
                                <th class="col-churn">이탈 신호 강도</th>
                                <th class="col-stt">감정 상태</th>
                                <th class="col-at">발화 시각</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${items.map(m => {
                                const score = msgAlertMap[m.id] || 0;
                                const isAlert = score >= 0.65;
                                const churnCell = isAlert
                                    ? '<span class="churn-alert" title="클릭 시 상세 안내"><i class="fa-solid fa-triangle-exclamation"></i> ' + score.toFixed(2) + '</span>'
                                    : '<span class="churn-normal">' + score.toFixed(2) + '</span>';
                                return `
                                <tr>
                                    <td class="col-id">${m.id}</td>
                                    <td class="col-sess">S-${m.sess_id}</td>
                                    <td><span class="msg-badge ${m.speaker.toLowerCase()}">${m.speaker}</span></td>
                                    <td class="col-speaker-id">${m.speaker_id != null ? m.speaker_id : 'NULL'}</td>
                                    <td style="max-width:280px;white-space:pre-wrap;">${escHtml(m.text || '')}</td>
                                    <td class="col-sat">${satText}</td>
                                    <td class="col-churn">${churnCell}</td>
                                    <td class="col-stt" title="STT 신뢰도: ${parseFloat(m.stt_conf).toFixed(2)}"><span class="stt-icon">${getSttEmoji(m.stt_conf)}</span></td>
                                    <td class="col-at">${formatTime(m.at)}</td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                `;
            } catch (e) {
                console.error('SessionChat API 오류:', e);
                container.innerHTML = '<div class="empty-state"><p>데이터를 불러오지 못했습니다. 서버 연결을 확인해주세요.</p></div>';
            }
        }

        document.getElementById('sidebarToggle').addEventListener('click', function () {
            const sidebar = document.getElementById('sidebar');
            const icon = this.querySelector('i');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                icon.className = 'fa-solid fa-chevron-right';
                this.setAttribute('title', '메뉴 펼치기');
            } else {
                icon.className = 'fa-solid fa-chevron-left';
                this.setAttribute('title', '메뉴 접기');
            }
        });

        document.addEventListener('click', function (e) {
            if (e.target.closest('.churn-alert')) {
                document.getElementById('churnModalOverlay').classList.add('show');
            }
        });
        document.getElementById('churnModalConfirm').addEventListener('click', function () {
            document.getElementById('churnModalOverlay').classList.remove('show');
        });
        document.getElementById('churnModalOverlay').addEventListener('click', function (e) {
            if (e.target === this) this.classList.remove('show');
        });

        const params = new URLSearchParams(window.location.search);
        const sessId = parseInt(params.get('sess_id') || params.get('id') || '0', 10);
        if (sessId) {
            renderChat(sessId);
        } else {
            document.getElementById('chatContent').innerHTML = '<div class="empty-state"><p>세션 ID가 없습니다. <a href="Session.html">목록</a>에서 세션을 선택해주세요.</p></div>';
        }
    </script>
</body>
</html>
