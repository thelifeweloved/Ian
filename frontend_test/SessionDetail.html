<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWay - 세션 분석 상세</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        body { display: flex; background-color: #f8f9fa; height: 100vh; overflow: hidden; }

        .sidebar {
            width: 280px;
            background-color: #373f50;
            color: white;
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            flex-shrink: 0;
            position: relative;
            transition: width 0.3s ease;
            overflow: hidden;
        }
        .sidebar.collapsed { width: 72px; padding: 40px 12px; }
        .sidebar.collapsed .sidebar-header,
        .sidebar.collapsed .sidebar-header-inner,
        .sidebar.collapsed .menu-label,
        .sidebar.collapsed .nav-text,
        .sidebar.collapsed .nav-arrow,
        .sidebar.collapsed .btn-text { display: none !important; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 12px; }
        .sidebar.collapsed .settings-btn,
        .sidebar.collapsed .logout-btn { justify-content: center; padding: 15px 12px; }
        .sidebar-toggle {
            position: absolute; top: 24px; right: 12px;
            width: 28px; height: 28px; border-radius: 50%;
            background-color: #40444e; border: 1px solid rgba(255,255,255,0.1);
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; transition: background-color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .sidebar-toggle:hover { background-color: #4a4e5a; }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
            width: 100%;
        }
        .sidebar-header-inner {
            display: inline-block;
            text-align: left;
        }
        .brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 300;
            margin-bottom: 12px;
            padding: 0;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #E5C76B;
            opacity: 0.95;
            white-space: nowrap;
        }
        .user-profile {
            padding: 0;
            text-align: left;
            width: 100%;
        }
        .user-name {
            font-size: 0.95rem;
            font-weight: 500;
            margin-bottom: 4px;
        }
        .user-email {
            font-size: 0.75rem;
            opacity: 0.6;
        }
        .menu-label {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 15px;
            padding-left: 10px;
            text-transform: uppercase;
        }
        .nav-menu {
            list-style: none;
            flex-grow: 1;
        }
        .nav-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            transition: 0.2s;
            gap: 10px;
        }
        .nav-item span.nav-text {
            flex: 1;
            text-align: left;
        }
        .nav-item.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }
        .settings-btn {
            margin-top: auto;
            display: flex;
            align-items: center;
            padding: 15px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .settings-btn:hover {
            color: white;
        }
        .logout-btn {
            margin-top: 0;
            color: #ff9a9a;
            display: flex;
            align-items: center;
            padding: 15px;
            text-decoration: none;
            font-weight: 500;
        }

        .main-content {
            flex-grow: 1;
            min-width: 0;
            padding: 24px 32px;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
        }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; gap: 16px; flex-wrap: wrap; }
        .header h2 { flex-shrink: 0; font-size: 1.5rem; }
        .btn-back {
            padding: 10px 16px;
            background: #373f50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-back:hover { background: #2c3442; }

        .analysis-card {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            margin-bottom: 20px;
        }
        .analysis-card h3 {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #eee;
        }
        .analysis-row {
            margin-bottom: 16px;
        }
        .analysis-row:last-child { margin-bottom: 0; }
        .analysis-label {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 4px;
        }
        .analysis-value {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .note-input {
            width: 100%;
            min-height: 100px;
            padding: 14px;
            border: 1px solid #e1e5ee;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s;
        }
        .note-input:focus {
            border-color: #7389f4;
            box-shadow: 0 0 0 3px rgba(115, 137, 244, 0.1);
        }
        .note-row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
            margin-top: 8px;
        }
        .btn-save {
            padding: 10px 18px;
            background: #7389f4;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            flex-shrink: 0;
            transition: background 0.2s;
        }
        .btn-save:hover { background: #5d74e3; }
        .btn-save.saved {
            background: #27ae60;
            cursor: default;
        }
        .analysis-meta {
            font-size: 0.75rem;
            color: #999;
            margin-top: 8px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        /* text_emotion 리포트 */
        .emotion-report {
            background: white;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.03);
            margin-bottom: 24px;
            border-left: 4px solid #E5C76B;
        }
        .emotion-report h3 {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #eee;
        }
        .emotion-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .emotion-table th {
            text-align: left;
            padding: 10px 12px;
            color: #999;
            border-bottom: 1px solid #eee;
        }
        .emotion-table td {
            padding: 12px;
            border-bottom: 1px solid #f8f9fa;
        }
        .emotion-table tr:hover { background-color: #f9faff; }
        .emotion-label { font-weight: 600; color: #333; }
        .emotion-score { font-family: monospace; font-weight: 700; }
        .emotion-score.high { color: #e74c3c; }
        .emotion-score.mid { color: #f39c12; }
        .emotion-score.low { color: #27ae60; }

        /* 통합 리포트 영역 - 출력용 리포트 형식 */
        .report-wrapper {
            display: flex;
            justify-content: center;
            padding: 0 0 40px 0;
        }
        .report-container {
            background: white;
            padding: 36px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            width: 100%;
            max-width: 850px;
        }
        .report-header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e1e5ee;
        }
        .report-header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }
        .report-header .report-meta {
            font-size: 0.85rem;
            color: #888;
        }
        .report-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 24px;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .session-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 28px;
        }
        .metric-card {
            background: #fff;
            border: 1px solid #e8eaef;
            border-radius: 12px;
            padding: 18px 20px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .metric-card .metric-label {
            font-size: 0.8rem;
            color: #8b92a0;
            margin-bottom: 8px;
            font-weight: 600;
        }
        .metric-card .metric-value {
            font-size: 1.4rem;
            font-weight: 700;
            color: #333;
        }
        .report-section {
            margin-bottom: 28px;
            page-break-inside: avoid;
        }
        .report-section:last-child { margin-bottom: 0; }
        .report-section h4 {
            font-size: 1rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 14px;
            padding: 8px 12px;
            background: #f8f9fa;
            border-left: 4px solid #E5C76B;
            border-radius: 4px;
        }
        .btn-print {
            padding: 10px 18px;
            background: #373f50;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-print:hover { background: #2c3442; }

        @media print {
            @page {
                size: A4;
                margin: 18mm;
            }
            body {
                display: block !important;
                height: auto !important;
                overflow: visible !important;
                background: white !important;
            }
            .sidebar,
            .btn-back,
            .btn-print,
            .header .btn-back,
            #pageTitle,
            .note-input,
            .btn-save,
            .note-row {
                display: none !important;
            }
            .main-content {
                padding: 0 !important;
                overflow: visible !important;
            }
            .header {
                margin-bottom: 24px !important;
                justify-content: center !important;
                border-bottom: 1px solid #ddd !important;
                padding-bottom: 16px !important;
            }
            .report-wrapper { padding: 0 !important; }
            .report-container {
                box-shadow: none !important;
                padding: 0 !important;
                max-width: 100% !important;
                border: none !important;
            }
            .report-header {
                margin-bottom: 24px !important;
                padding-bottom: 16px !important;
            }
            .report-section {
                page-break-inside: avoid !important;
            }
            .analysis-value { white-space: pre-wrap !important; }
            .note-print {
                display: block !important;
                white-space: pre-wrap !important;
                padding: 10px 0;
                border: 1px solid #eee;
                border-radius: 6px;
                padding: 12px;
                margin-top: 6px;
                background: #fafafa;
                font-size: 0.9rem;
                line-height: 1.6;
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>

<body>
    <aside class="sidebar" id="sidebar">
        <button type="button" class="sidebar-toggle" id="sidebarToggle" title="메뉴 접기/펼치기" aria-label="메뉴 접기">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="sidebar-header">
            <div class="sidebar-header-inner">
                <div class="brand-name">MindWay</div>
                <div class="user-profile">
                    <div class="user-name">스노우화이트 상담사</div>
                    <div class="user-email"><a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="9dfef2e8f3eef8f1f2efddf0f4f3f9eafce4b3fef2f0">[email&#160;protected]</a></div>
                </div>
            </div>
        </div>
        <div class="menu-label">Main</div>
        <nav class="nav-menu">
            <a href="Main.html" class="nav-item">
                <i class="fa-solid fa-house"></i>
                <span class="nav-text">Dashboard</span>
                <i class="fa-solid fa-chevron-up nav-arrow"></i>
            </a>
            <a href="Session.html" class="nav-item active">
                <i class="fa-regular fa-user"></i>
                <span class="nav-text">Session Report</span>
                <i class="fa-solid fa-chevron-down nav-arrow"></i>
            </a>
        </nav>
        <a href="#" class="settings-btn"><i class="fa-solid fa-gear"></i><span class="btn-text">&nbsp; Settings</span></a>
        <a href="#" class="logout-btn"><i class="fa-solid fa-arrow-right-from-bracket"></i><span class="btn-text">&nbsp; Logout Account</span></a>
    </aside>

    <main class="main-content">
        <header class="header">
            <h2 id="pageTitle">세션 분석 상세</h2>
            <div style="display: flex; gap: 10px; align-items: center;">
                <button type="button" class="btn-print" onclick="window.print()">
                    <i class="fa-solid fa-print"></i> 리포트 출력
                </button>
                <a href="Session.html" class="btn-back">
                    <i class="fa-solid fa-arrow-left"></i> 목록으로
                </a>
            </div>
        </header>

        <div class="report-wrapper">
            <div id="reportContent" class="report-container">
                <!-- 통합 리포트: text_emotion + sess_analysis -->
            </div>
        </div>
    </main>

    <script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
        // ★ API 연동: mock 데이터 제거, 실제 DB에서 불러옴
        const API_BASE_URL = 'http://127.0.0.1:8000';

        const labelKo = { neutral: '중립', anxiety: '불안', sadness: '슬픔', anger: '분노', joy: '기쁨', fear: '공포', happy: '행복', sad: '슬픔', happiness: '행복' };

        // ★ note 저장: main.py에 sess_analysis note 저장 엔드포인트가 없어 현재 세션 내에서만 반영됨
        // (추후 PATCH /sessions/{sess_id}/analysis 엔드포인트 추가 시 DB 저장 가능)
        const _noteDraft = {};
        function saveNote(analysisIdx) {
            const textarea = document.getElementById('note-' + analysisIdx);
            const btn = document.querySelector('.btn-save[data-id="' + analysisIdx + '"]');
            if (!textarea || !btn) return;
            _noteDraft[analysisIdx] = textarea.value;
            btn.innerHTML = '<i class="fa-solid fa-check"></i> 저장됨';
            btn.classList.add('saved');
            setTimeout(() => {
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> 저장';
                btn.classList.remove('saved');
            }, 2000);
        }

        function escHtml(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }
        function formatTime(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' }) + ' ' +
                d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
        }

        async function renderReport(sessId) {
            document.getElementById('pageTitle').innerText = '세션 S-' + sessId + ' 분석 리포트';
            const container = document.getElementById('reportContent');
            container.innerHTML = '<div class="empty-state"><p>불러오는 중...</p></div>';

            try {
                // ★ 2개 API 병렬 호출: 텍스트 정서 분석 / 세션 대시보드(만족도·품질·토픽분석)
                const [emotionRes, dashRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/sessions/${sessId}/emotions`),
                    fetch(`${API_BASE_URL}/sessions/${sessId}/dashboard`)
                ]);
                const emotionItems = ((await emotionRes.json()).items || [])
                    .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
                const dash = await dashRes.json();

                // 만족도
                const satRaw = dash.session?.sat;
                const satText = satRaw === 1 || satRaw === true ? '만족'
                              : satRaw === 0 || satRaw === false ? '불만족' : '—';

                // 품질점수 / 흐름점수
                const flowVal  = dash.quality?.flow  != null ? parseFloat(dash.quality.flow).toFixed(1)  : '—';
                const scoreVal = dash.quality?.score != null ? parseFloat(dash.quality.score).toFixed(1) : '—';

                // 1. 텍스트 정서 분석 HTML
                const emotionHtml = emotionItems.length === 0 ? '' : `
                    <div class="report-section">
                        <h4><i class="fa-solid fa-heart-pulse"></i> 1. 텍스트 정서 분석</h4>
                        <table class="emotion-table">
                            <thead>
                                <tr>
                                    <th>메시지 ID</th>
                                    <th>정서 라벨</th>
                                    <th>점수</th>
                                    <th>생성 시점</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${emotionItems.map(e => {
                                    const sc = parseFloat(e.score) || 0;
                                    const scoreClass = sc >= 0.7 ? 'high' : sc >= 0.4 ? 'mid' : 'low';
                                    return `<tr>
                                        <td>M-${e.msg_id}</td>
                                        <td class="emotion-label">${labelKo[e.label] || e.label}</td>
                                        <td><span class="emotion-score ${scoreClass}">${sc.toFixed(2)}</span></td>
                                        <td>${formatTime(e.created_at)}</td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>
                    </div>`;

                // 2. 토픽별 세션 분석 HTML (dashboard의 topic_analysis 사용)
                const topicItems = dash.topic_analysis || [];
                const analysisHtml = topicItems.length === 0
                    ? '<div class="empty-state"><p>해당 세션의 토픽별 분석이 없습니다.</p></div>'
                    : '<div class="report-section"><h4><i class="fa-solid fa-folder-open"></i> 2. 토픽별 세션 분석</h4>' +
                      topicItems.map((a, idx) => `
                        <div class="analysis-card" data-id="${idx}" style="margin-bottom: 20px;">
                            <h3>${idx + 1}. ${escHtml(a.topic_name || '토픽')}</h3>
                            <div class="analysis-row">
                                <div class="analysis-label">AI 분석 요약 (summary)</div>
                                <div class="analysis-value">${(() => {
                                    let s = a.summary || '';
                                    try {
                                        const parsed = JSON.parse(s);
                                        s = parsed.summary_md || parsed.summary || s;
                                    } catch(e) {
                                        s = s.replace(/^```json\s*/,'').replace(/```$/,'').trim();
                                        try { s = JSON.parse(s).summary_md || s; } catch(e2) {}
                                    }
                                    return escHtml(s);
                                })()}</div>
                            </div>
                            <div class="analysis-row">
                                <div class="analysis-label">상담사 의견 (note)</div>
                                <textarea class="note-input" id="note-${idx}" placeholder="상담사 의견을 입력하세요...">${escHtml(a.note || '')}</textarea>
                                <div class="note-row">
                                    <button type="button" class="btn-save" data-id="${idx}" onclick="saveNote(${idx})">
                                        <i class="fa-solid fa-floppy-disk"></i> 저장
                                    </button>
                                </div>
                                <div class="note-print" style="display:none;" id="note-print-${idx}">${escHtml(a.note || '')}</div>
                            </div>
                        </div>`).join('') + '</div>';

                const metricsHtml = `
                    <div class="session-metrics">
                        <div class="metric-card">
                            <div class="metric-label">만족도</div>
                            <div class="metric-value">${satText}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">품질점수</div>
                            <div class="metric-value">${scoreVal}</div>
                        </div>
                        <div class="metric-card">
                            <div class="metric-label">흐름점수</div>
                            <div class="metric-value">${flowVal}</div>
                        </div>
                    </div>`;

                const reportDate = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                container.innerHTML = `
                    <div class="report-header">
                        <h1>세션 S-${sessId} 통합 분석 리포트</h1>
                        <div class="report-meta">생성일시: ${reportDate}</div>
                    </div>
                    ${metricsHtml}
                    ${emotionHtml}
                    ${analysisHtml}`;

            } catch (e) {
                console.error('SessionDetail API 오류:', e);
                container.innerHTML = '<div class="empty-state"><p>데이터를 불러오지 못했습니다. 서버 연결을 확인해주세요.</p></div>';
            }
        }

        function updatePrintNote() {
            document.querySelectorAll('.note-input').forEach(ta => {
                const id = ta.id.replace('note-', '');
                const printDiv = document.getElementById('note-print-' + id);
                if (printDiv) printDiv.textContent = ta.value;
            });
        }

        const params = new URLSearchParams(window.location.search);
        const sessId = parseInt(params.get('sess_id') || params.get('id') || '0', 10);
        if (sessId) {
            renderReport(sessId);
        } else {
            document.getElementById('reportContent').innerHTML = '<div class="empty-state"><p>세션 ID가 없습니다. <a href="Session.html">목록</a>에서 세션을 선택해주세요.</p></div>';
        }

        window.addEventListener('beforeprint', updatePrintNote);

        document.getElementById('sidebarToggle').addEventListener('click', function () {
            const sidebar = document.getElementById('sidebar');
            const icon = this.querySelector('i');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                icon.className = 'fa-solid fa-chevron-right';
                this.setAttribute('title', '메뉴 펼치기');
                this.setAttribute('aria-label', '메뉴 펼치기');
            } else {
                icon.className = 'fa-solid fa-chevron-left';
                this.setAttribute('title', '메뉴 접기');
                this.setAttribute('aria-label', '메뉴 접기');
            }
        });

    </script>
</body>
</html>
