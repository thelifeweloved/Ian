<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWay - 실시간 상담 (내담자)</title>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* 기존 스타일 유지 (생략 없음) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; }
        body { display: flex; background: #f0f2f5; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background: #373f50; color: white; display: flex; flex-direction: column; padding: 40px 20px; flex-shrink: 0; transition: width 0.25s ease, padding 0.25s ease; position: relative; box-shadow: 4px 0 24px rgba(0,0,0,0.06); }
        .sidebar.collapsed { width: 72px; padding: 40px 12px; }
        .sidebar.collapsed .sidebar-header-inner .brand-name, 
        .sidebar.collapsed .user-profile, 
        .sidebar.collapsed .menu-label, 
        .sidebar.collapsed .nav-item .nav-item-text, 
        .sidebar.collapsed .settings-btn .btn-text, 
        .sidebar.collapsed .logout-btn .btn-text { display: none; }
        .sidebar.collapsed .sidebar-header { margin-bottom: 20px; }
        .sidebar.collapsed .nav-item { justify-content: center; padding: 12px; }
        .sidebar.collapsed .nav-item i:first-child { margin-right: 0; }
        .sidebar.collapsed .settings-btn, 
        .sidebar.collapsed .logout-btn { justify-content: center; padding: 15px 12px; }
        .sidebar.collapsed .nav-item .fa-chevron-up, 
        .sidebar.collapsed .nav-item .fa-chevron-down { display: none; }
        .sidebar-toggle-btn { position: absolute; top: 20px; right: 12px; width: 28px; height: 28px; border-radius: 8px; background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.9); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; z-index: 10; transition: all 0.2s; }
        .sidebar-toggle-btn:hover { background: rgba(229,199,107,0.25); color: #E5C76B; }
        .sidebar.collapsed .sidebar-toggle-btn { right: 50%; transform: translateX(50%); }
        .sidebar.collapsed .sidebar-toggle-btn i { transform: rotate(180deg); }
        .sidebar-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; width: 100%; }
        .sidebar-header-inner { display: inline-block; text-align: left; }
        .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; margin-bottom: 12px; letter-spacing: 0.35em; text-transform: uppercase; color: #E5C76B; opacity: 0.95; white-space: nowrap; }
        .user-profile { padding: 0; text-align: left; width: 100%; }
        .user-name { font-size: 0.95rem; font-weight: 500; margin-bottom: 4px; }
        .user-email { font-size: 0.75rem; opacity: 0.6; }
        .menu-label { font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-bottom: 15px; padding-left: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
        .nav-menu { list-style: none; flex-grow: 1; }
        .nav-item { display: flex; align-items: center; justify-content: flex-start; gap: 12px; padding: 12px 15px; border-radius: 10px; margin-bottom: 6px; cursor: pointer; color: rgba(255,255,255,0.75); text-decoration: none; transition: all 0.2s; }
        .nav-item i:first-child { margin-right: 0; font-size: 1rem; }
        .nav-item .fa-chevron-up, .nav-item .fa-chevron-down { margin-left: auto; font-size: 0.7rem; opacity: 0.6; }
        .nav-item:hover { background: rgba(255,255,255,0.06); color: white; }
        .nav-item.active { background: rgba(229,199,107,0.2); color: #E5C76B; }
        .settings-btn { margin-top: auto; display: flex; align-items: center; gap: 10px; padding: 15px; color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 500; transition: color 0.2s; }
        .settings-btn:hover { color: white; }
        .logout-btn { margin-top: 0; color: #ff9a9a; display: flex; align-items: center; gap: 10px; padding: 15px; text-decoration: none; font-weight: 500; }
        .logout-btn:hover { color: #ffb3b3; }
        .chat-layout { flex: 1; min-width: 0; display: flex; overflow: hidden; }
        .chat-main { flex: 1; min-width: 0; display: flex; flex-direction: column; background: #eef0f3; border-radius: 20px 0 0 0; box-shadow: -8px 0 32px rgba(0,0,0,0.04); overflow: hidden; }
        .chat-header { flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; padding: 18px 28px; background: #fff; border-bottom: 1px solid #e8eaef; }
        .chat-header-left { display: flex; align-items: center; gap: 12px; }
        .chat-header-left .avatar { width: 44px; height: 44px; border-radius: 12px; background: #7389f4; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 1rem; }
        .chat-header-left .title-wrap h2 { font-size: 1.2rem; font-weight: 600; color: #1a1d24; }
        .chat-header-left .title-wrap .session-id { font-size: 0.8rem; color: #8b92a0; margin-top: 2px; }
        .btn-end-session { width: 48px; height: 48px; padding: 0; border: none; border-radius: 12px; background: #fff5f5; color: #c62828; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-end-session:hover { background: #ffebee; color: #b71c1c; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; background: #eef0f3; -webkit-overflow-scrolling: touch; }
        .chat-msg { display: flex; max-width: 52%; animation: msgIn 0.3s ease; }
        @keyframes msgIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .chat-msg.msg-me { align-self: flex-end; }
        .chat-msg.msg-other { align-self: flex-start; }
        .chat-msg .bubble { padding: 10px 14px; border-radius: 12px; font-size: 0.85rem; line-height: 1.48; word-break: break-word; background: #fff; color: #1a1a1a; border: 1px solid #e8eaef; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
        .chat-msg.msg-me .bubble { border-left: 4px solid #E5C76B; } 
        .chat-msg .who { font-size: 0.7rem; font-weight: 600; margin-bottom: 3px; opacity: 0.85; }
        .chat-msg.msg-me .who { color: #333; }
        .chat-msg.msg-other .who { color: #7389f4; }
        .chat-msg .time { font-size: 0.65rem; margin-top: 4px; opacity: 0.7; }
        .chat-msg.msg-me .time { color: #555; }
        .chat-msg.msg-other .time { color: #888; }
        .chat-input-area { flex-shrink: 0; padding: 20px 28px 28px; background: #fff; border-top: 1px solid #e8eaef; }
        .chat-input-row { display: flex; gap: 12px; align-items: flex-end; }
        .chat-input-row textarea { flex: 1; min-height: 52px; max-height: 140px; padding: 14px 18px; background: #f0f2f5; border: 1px solid #dce0e6; border-radius: 14px; font-size: 0.95rem; resize: none; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        .chat-input-row textarea:focus { border-color: #7389f4; box-shadow: 0 0 0 3px rgba(115,137,244,0.15); }
        .chat-input-row .btn-send { flex-shrink: 0; padding: 14px 26px; border: none; border-radius: 14px; background: #7389f4; color: white; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: opacity 0.2s, transform 0.15s; }
        .chat-input-row .btn-send:hover { opacity: 0.95; transform: translateY(-1px); }
        .chat-input-row .btn-icon { flex-shrink: 0; width: 44px; height: 44px; border: 2px solid #2a2d32; border-radius: 12px; background: #fff; color: #6b7080; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; transition: all 0.2s; }
        .chat-input-row .btn-icon:hover { background: #f5f5f5; color: #555; }
        .chat-input-row .btn-icon.on { background: #E5C76B; color: #1a1a1a; border-color: #E5C76B; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #fff; border-radius: 16px; padding: 28px; max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
        .modal-box .modal-title { font-size: 1.1rem; font-weight: 600; color: #333; margin-bottom: 14px; }
        .modal-box .modal-text { font-size: 0.95rem; color: #555; line-height: 1.5; margin-bottom: 24px; }
        .modal-box .modal-actions { display: flex; gap: 12px; justify-content: center; }
        .modal-box .modal-actions button { padding: 10px 22px; border-radius: 10px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .modal-box .btn-cancel { border: 1px solid #e0e4f0; background: #fff; color: #666; }
        .modal-box .btn-cancel:hover { background: #f5f5f5; }
        .modal-box .btn-confirm { border: none; background: #E5C76B; color: #1a1a1a; }
        .modal-box .btn-confirm:hover { background: #d4b85a; }
        .modal-box .btn-satisfy { border: none; background: #4caf50; color: #fff; }
        .modal-box .btn-satisfy:hover { background: #43a047; }
        .modal-box .btn-dissatisfy { border: 1px solid #e0e4f0; background: #fff; color: #666; }
        .modal-box .btn-dissatisfy:hover { background: #ffebee; color: #c62828; }
        .modal-box-simple .modal-text-only { font-size: 1rem; color: #333; line-height: 1.5; margin-bottom: 24px; font-weight: 500; }
        .modal-one-line-wrap { margin-bottom: 20px; text-align: left; }
        .modal-one-line-wrap label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 8px; }
        .modal-one-line-input { width: 100%; padding: 12px 14px; border: 1px solid #dce0e6; border-radius: 10px; font-size: 0.95rem; outline: none; box-sizing: border-box; }
        .modal-one-line-input:focus { border-color: #E5C76B; }
        .source-select-box { display: flex; flex-direction: column; gap: 12px; margin-bottom: 12px; }
        .source-btn { display: flex; align-items: center; gap: 14px; padding: 16px 20px; border: 2px solid #e8eaef; border-radius: 12px; background: #fafbfc; cursor: pointer; transition: all 0.2s; text-align: left; width: 100%; }
        .source-btn:hover { border-color: #7389f4; background: #f0f2ff; }
        .source-btn .src-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .source-btn.webcam-btn .src-icon { background: #e8eeff; color: #5c6fd6; }
        .source-btn.file-btn .src-icon { background: #e6f9f0; color: #1a7f5a; }
        .source-btn .src-title { font-size: 0.95rem; font-weight: 700; color: #222; margin-bottom: 2px; }
        .source-btn .src-sub { font-size: 0.78rem; color: #999; }
        .chat-right-panel { width: 340px; flex-shrink: 0; background: #fff; border-left: 1px solid #e8eaef; display: flex; flex-direction: column; overflow: hidden; box-shadow: -4px 0 24px rgba(0,0,0,0.04); }
        .panel-section { padding: 20px; border-bottom: 1px solid #f0f1f5; }
        .panel-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; color: #8b92a0; margin-bottom: 12px; }
        .video-end-wrap { display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px; }
        .btn-video-end { width: 100%; padding: 8px 12px; border: none; border-radius: 8px; background: #1a237e; color: #fff; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: background 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-video-end:hover { background: #283593; }
        .live-feed-wrap { background: #0d0e10; border-radius: 12px; aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; border: 1px solid #2a2d32; box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03), inset 0 2px 20px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.15); }
        .live-feed-wrap .placeholder { color: #6b7080; font-size: 0.9rem; font-weight: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 24px; text-align: center; }
        .live-feed-wrap .placeholder .icon-wrap { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; }
        .live-feed-wrap .placeholder .icon-wrap i { font-size: 1.75rem; color: #4a4e58; }
        .live-feed-wrap video { width: 100%; height: 100%; object-fit: cover; border-radius: 0; }
        .live-feed-wrap .badge-live { position: absolute; top: 12px; left: 12px; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); color: #fff; font-size: 0.65rem; font-weight: 700; padding: 6px 12px; border-radius: 6px; letter-spacing: 0.08em; display: inline-flex; align-items: center; gap: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .live-feed-wrap .badge-live .dot { width: 6px; height: 6px; border-radius: 50%; background: #f44336; animation: livePulse 1.5s ease-in-out infinite; }
        @keyframes livePulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.9); } }
        @media (max-width: 1024px) { .chat-right-panel { width: 280px; } }
        @media (max-width: 768px) { .chat-right-panel { display: none; } .chat-main { border-radius: 0; } }
        .chat-msg .bubble img { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 8px; display: block; cursor: pointer; }

        /* ── 고민 유형 선택 모달 ── */
        .topic-modal-overlay { z-index: 1100; }
        .topic-modal-box { background: #fff; border-radius: 20px; padding: 32px 28px 28px; max-width: 480px; width: 94%; box-shadow: 0 24px 64px rgba(0,0,0,0.18); position: relative; max-height: 90vh; overflow-y: auto; }
        .topic-modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 1.1rem; color: #aab0be; cursor: pointer; transition: color 0.2s; }
        .topic-modal-close:hover { color: #555; }
        .topic-modal-title { font-size: 1.2rem; font-weight: 700; color: #373f50; margin-bottom: 6px; }
        .topic-modal-intro { font-size: 0.92rem; color: #555; margin-bottom: 4px; }
        .topic-modal-desc { font-size: 0.82rem; color: #aab0be; margin-bottom: 10px; }
        .topic-selected-count { font-size: 0.82rem; font-weight: 600; color: #7389f4; margin-bottom: 14px; }
        .topic-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .topic-chip { padding: 10px 8px; border: 2px solid #e8eaef; border-radius: 12px; background: #fafbfc; font-size: 0.82rem; font-weight: 600; color: #555; cursor: pointer; text-align: center; transition: all 0.15s; user-select: none; }
        .topic-chip:hover { border-color: #7389f4; background: #f0f2ff; color: #7389f4; }
        .topic-chip.selected { border-color: #7389f4; background: #7389f4; color: #fff; }
        .topic-chip.disabled { opacity: 0.4; cursor: not-allowed; }
        .topic-modal-complete { width: 100%; padding: 13px; border: none; border-radius: 12px; background: #7389f4; color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
        .topic-modal-complete:disabled { opacity: 0.4; cursor: not-allowed; }
        .topic-modal-complete:not(:disabled):hover { opacity: 0.9; }
        .topic-etc-modal .modal-etc-title { font-size: 0.95rem; font-weight: 600; color: #373f50; margin-bottom: 12px; }
    </style>
</head>

<body>
    <aside class="sidebar" id="sidebar">
        <button type="button" class="sidebar-toggle-btn" id="sidebarToggle" title="메뉴 접기/펼치기">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <div class="sidebar-header">
            <div class="sidebar-header-inner">
                <div class="brand-name">MindWay</div>
                <div class="user-profile">
                    <div class="user-name" id="displayClientName"></div>
                    <div class="user-email" id="displayClientEmail"></div>
                </div>
            </div>
        </div>
        <div class="menu-label">내담자 상담</div>
        <nav class="nav-menu">
            <a href="Chat_client.html" class="nav-item active">
                <i class="fa-solid fa-user"></i>
                <span class="nav-item-text">내담자 상담</span>
                <i class="fa-solid fa-chevron-down"></i>
            </a>
        </nav>
        <a href="#" class="settings-btn"><i class="fa-solid fa-gear"></i><span class="btn-text"> Settings</span></a>
        <a href="Landing.html" class="logout-btn" onclick="localStorage.clear();"><i class="fa-solid fa-arrow-right-from-bracket"></i><span class="btn-text"> Logout Account</span></a>
    </aside>

    <div class="chat-layout">
        <main class="chat-main">
            <header class="chat-header">
                <div class="chat-header-left">
                    <div class="avatar"><i class="fa-solid fa-user"></i></div>
                    <div class="title-wrap">
                        <h2 id="headerClientName">내담자</h2>
                        <div class="session-id" id="headerSessionId">SESS-WAIT · 상담 준비 중</div>
                    </div>
                </div>
                <button type="button" class="btn-end-session" title="상담 종료"><i class="fa-solid fa-right-from-bracket"></i></button>
            </header>
            
            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-area">
                <div id="videoActiveBar" style="display:none;background:#1a237e;color:#fff;font-size:0.8rem;font-weight:600;padding:6px 14px;border-radius:8px 8px 0 0;align-items:center;justify-content:space-between;">
                    <span><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:#f44336;margin-right:6px;animation:livePulse 1.5s infinite;"></span>영상 전송 중</span>
                    <button type="button" id="btnVideoEnd" onclick="stopVideo()" style="background:none;border:none;color:#fff;font-size:0.8rem;cursor:pointer;text-decoration:underline;">영상종료</button>
                </div>
                <div class="chat-input-row">
                    <textarea id="messageInput" placeholder="상담사에게 마음 편히 고민을 말해보세요." rows="1"></textarea>
                    <button type="button" class="btn-icon" id="btnImage" title="이미지"><i class="fa-solid fa-image"></i></button>
                    <button type="button" class="btn-icon" id="btnVideo" title="영상"><i class="fa-solid fa-video"></i></button>
                    <button type="button" class="btn-send" id="btnSend">전송</button>
                </div>
            </div>

            <div class="modal-overlay" id="recordingConsentModal">
                <div class="modal-box" style="max-width:420px;text-align:left;">
                    <div class="modal-title" style="text-align:center;margin-bottom:16px;">개인정보 수집 및 이용 동의</div>
                    <div class="modal-text" style="margin-bottom:18px;">원활한 상담 서비스 제공을 위해 아래 항목에 동의해 주세요.</div>
                    <div style="border:1px solid #e8ecf4;border-radius:10px;padding:14px 16px;margin-bottom:12px;">
                        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
                            <input type="checkbox" id="consentChat" style="margin-top:3px;accent-color:#7389f4;" required>
                            <span>
                                <strong style="color:#333;">[필수] 채팅 내용 저장 동의</strong><br>
                                <span style="font-size:0.82rem;color:#888;">상담 내용은 서비스 품질 향상 및 상담사 참고용으로 저장됩니다.</span>
                            </span>
                        </label>
                    </div>
                    <div style="border:1px solid #e8ecf4;border-radius:10px;padding:14px 16px;margin-bottom:20px;">
                        <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
                            <input type="checkbox" id="consentVideo" style="margin-top:3px;accent-color:#7389f4;">
                            <span>
                                <strong style="color:#333;">[선택] 영상 녹화 동의</strong><br>
                                <span style="font-size:0.82rem;color:#888;">얼굴 감정 분석을 위해 상담 중 영상이 사용될 수 있습니다. 동의 시 웹캠/영상 연결이 활성화됩니다.</span>
                            </span>
                        </label>
                    </div>
                    <div class="modal-actions" style="flex-direction:column;gap:8px;">
                        <button type="button" class="btn-confirm" id="recordingConsentConfirm" disabled style="width:100%;opacity:0.5;">확인</button>
                        <button type="button" class="btn-cancel" style="width:100%;" onclick="this.closest('.modal-overlay').classList.remove('show')">취소하기</button>
                    </div>
                </div>
            </div>

            <div class="modal-overlay" id="videoSourceModal">
                <div class="modal-box">
                    <div class="modal-title">영상 소스 선택</div>
                    <div class="source-select-box">
                        <button type="button" class="source-btn webcam-btn" id="btnSelectWebcam">
                            <span class="src-icon"><i class="fa-solid fa-camera"></i></span>
                            <span>
                                <div class="src-title">📷 웹캠</div>
                                <div class="src-sub">카메라로 실시간 데이터 전송</div>
                            </span>
                        </button>
                        <button type="button" class="source-btn file-btn" id="btnSelectFile">
                            <span class="src-icon"><i class="fa-solid fa-film"></i></span>
                            <span>
                                <div class="src-title">🎬 동영상 파일</div>
                                <div class="src-sub">mp4, mov 등 파일로 시연 전송</div>
                            </span>
                        </button>
                    </div>
                    <button type="button" class="btn-cancel" style="width:100%;padding:10px;border-radius:10px;border:1px solid #e0e4f0;background:#fff;color:#666;font-size:0.9rem;cursor:pointer;" onclick="this.closest('.modal-overlay').classList.remove('show')">취소</button>
                </div>
            </div>
            
            <input type="file" id="imageFileInput" accept="image/*" style="display:none;">
            <input type="file" id="videoFileInput" accept="video/*" style="display:none;">

            <!-- 고민 유형 선택 팝업 (채팅 입장 시 표시) -->
            <div class="modal-overlay topic-modal-overlay" id="topicSelectModal">
                <div class="topic-modal-box">
                    <button type="button" class="topic-modal-close" id="topicModalClose" title="닫기" aria-label="닫기"><i class="fa-solid fa-xmark"></i></button>
                    <h2 class="topic-modal-title">주요 고민 유형 선택</h2>
                    <p class="topic-modal-intro">어떤 고민으로 상담을 신청하시나요?</p>
                    <p class="topic-modal-desc">상담 준비를 위해 주요 고민 유형을 1~3개 선택해주세요.</p>
                    <p class="topic-selected-count" id="topicSelectedCount">0개 선택됨 (최대 3개)</p>
                    <div class="topic-grid" id="topicSelectGrid"></div>
                    <button type="button" class="topic-modal-complete" id="topicModalComplete" disabled>완료</button>
                </div>
            </div>
            <div class="modal-overlay topic-etc-modal" id="topicEtcModal">
                <div class="modal-box">
                    <p class="modal-etc-title">기타 주요 고민 유형 내용을 적어주세요.</p>
                    <textarea class="modal-one-line-input" id="topicEtcInput" placeholder="고민 유형을 입력해 주세요." maxlength="500" rows="4" style="resize:vertical;"></textarea>
                    <div class="modal-actions" style="margin-top:14px;">
                        <button type="button" class="btn-confirm" id="topicEtcConfirm">확인</button>
                        <button type="button" class="btn-cancel" id="topicEtcCancel">취소</button>
                    </div>
                </div>
            </div>

            <!-- 상담 종료 모달: 만족도 + 한줄평 통합 -->
            <div class="modal-overlay" id="endSessionModal">
                <div class="modal-box">
                    <div class="modal-title">상담이 종료됩니다</div>
                    <div class="modal-text">이번 상담은 어떠셨나요?</div>

                    <!-- 만족도 선택 -->
                    <div style="display:flex; gap:12px; justify-content:center; margin-bottom:20px;">
                        <button type="button" id="endSessionSatisfy"
                            style="flex:1; padding:12px; border-radius:10px; border:2px solid #e0e4f0; background:#fff; font-size:1.3rem; cursor:pointer; transition:all 0.15s;"
                            onclick="selectSat(1, this)">😊 만족</button>
                        <button type="button" id="endSessionDissatisfy"
                            style="flex:1; padding:12px; border-radius:10px; border:2px solid #e0e4f0; background:#fff; font-size:1.3rem; cursor:pointer; transition:all 0.15s;"
                            onclick="selectSat(0, this)">😞 불만족</button>
                    </div>

                    <!-- 한줄평 -->
                    <div class="modal-one-line-wrap">
                        <label for="thankYouOneLine" style="font-size:0.85rem; color:#555;">한줄평 <span style="color:#aab0be;">(선택)</span></label>
                        <input type="text" class="modal-one-line-input" id="thankYouOneLine"
                            placeholder="상담에 대한 짧은 의견을 남겨주세요." maxlength="200">
                    </div>

                    <div class="modal-actions" style="flex-direction:column; gap:8px;">
                        <button type="button" class="btn-confirm" id="endSessionConfirm"
                            style="width:100%; opacity:0.5; cursor:not-allowed;" disabled>확인</button>
                        <button type="button" class="btn-cancel" id="endSessionCancel"
                            style="width:100%;">취소</button>
                    </div>
                </div>
            </div>
        </main>
        
        <!-- localVideo: 화면에 안 보이지만 백그라운드 스트리밍용 -->
        <video id="localVideo" playsinline autoplay muted style="display:none;position:absolute;width:0;height:0;"></video>
    </div>

    <script>
        /* [중요] config.js에서 정의된 API_BASE_URL을 사용합니다. 
           만약 ReferenceError가 발생한다면 config.js 로드 여부를 확인하세요. */
        
        const _cparam = new URLSearchParams(window.location.search);
        const clientId = _cparam.get('client_id') || localStorage.getItem('client_id') || 1; 
        const counselorId = _cparam.get('counselor_id') || localStorage.getItem('counselor_id') || 1; 
        const clientName = localStorage.getItem('client_name') || '내담자';

        let windowSessId = null;
        let lastMsgCount = 0;
        let isPolling = false;

        document.getElementById('displayClientName').innerText = clientName;
        document.getElementById('headerClientName').innerText = clientName;

        const clientEmail = localStorage.getItem('client_email') || '이메일 정보 없음';
        const emailEl = document.getElementById('displayClientEmail');
        if (emailEl) emailEl.innerText = clientEmail;

        document.getElementById('sidebarToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('collapsed');
        });

        async function initSession() {
            // 1. [추가] localStorage에서 이름과 ID를 가져와 화면에 표시
            const storedName = localStorage.getItem('client_name');
            const storedId = localStorage.getItem('client_id');

            if (storedName) {
                // 사이드바나 프로필 영역의 이름 변경
                const userNameEl = document.querySelector('.user-name');
                if (userNameEl) userNameEl.textContent = storedName;
            }
            if (storedId) {
                // 이메일 자리에 ID 표시 (선택 사항)
                const userEmailEl = document.querySelector('.user-email');
                if (userEmailEl) userEmailEl.textContent = `ID: ${storedId}`;
            }

            // --- 아래는 기존 로직 그대로 유지 ---
            // [체크] API_BASE_URL이 존재하지 않을 경우를 대비한 안전장치
            const baseUrl = API_BASE_URL;
            
            try {
                const res = await fetch(`${baseUrl}/client/start-session`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ client_id: Number(clientId), counselor_id: Number(counselorId) })
                });
                const data = await res.json();
                if (data.sess_id) {
                    windowSessId = data.sess_id;
                    sessionStorage.setItem('mw_sess_id', String(data.sess_id)); // 새로고침 대비 저장
                    document.getElementById('headerSessionId').innerText = `SESS-${data.sess_id} · 상담 진행 중`;
                    document.getElementById('chatMessages').innerHTML = ''; // 이전 채팅 초기화
                    lastMsgCount = 0;
                    setInterval(fetchMessages, 2000);
                    startHeartbeat();  // heartbeat 시작
                    loadAndShowTopicModal(); // 고민 유형 선택 모달 표시
                }
            } catch (e) { console.error("세션 실패:", e); }
        }

        function renderMessages(msgs) {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';
            msgs.forEach(m => {
                const isMe = m.speaker === 'CLIENT'; 
                const timeStr = new Date(m.at).toLocaleTimeString('ko-KR', { hour: 'numeric', minute: '2-digit' });
                const div = document.createElement('div');
                div.className = `chat-msg ${isMe ? 'msg-me' : 'msg-other'}`;
                
                let content = m.text;
                if (content && content.startsWith('data:image')) {
                    content = `<img src="${content}" alt="전송 이미지" onclick="window.open(this.src)">`;
                }
                
                div.innerHTML = `<div class="bubble"><div class="who">${isMe ? '나' : '상담사'}</div>${content}<div class="time">${timeStr}</div></div>`;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        }

        async function fetchMessages() {
            if(!windowSessId || isPolling) return;
            isPolling = true;
            const baseUrl = API_BASE_URL;
            try {
                const res = await fetch(`${baseUrl}/sessions/${windowSessId}/messages?limit=100`);
                const data = await res.json();
                const msgs = data.items || [];
                if (msgs.length > lastMsgCount) { renderMessages(msgs); lastMsgCount = msgs.length; }
            } catch (e) { } finally { isPolling = false; }
        }

        async function postMessage(payload) {
            const baseUrl = API_BASE_URL;
            try {
                await fetch(`${baseUrl}/messages`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                fetchMessages();
            } catch(e) { console.error("메시지 전송 실패:", e); }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !windowSessId) return;
            input.value = '';
            await postMessage({ sess_id: Number(windowSessId), speaker: 'CLIENT', speaker_id: Number(clientId), text: text, stt_conf: 0.0 });
        }

        // 이미지 버튼 로직
        document.getElementById('btnImage').addEventListener('click', () => document.getElementById('imageFileInput').click());
        document.getElementById('imageFileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && windowSessId) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    await postMessage({ sess_id: Number(windowSessId), speaker: 'CLIENT', speaker_id: Number(clientId), text: ev.target.result, stt_conf: 0.0 });
                };
                reader.readAsDataURL(file);
                this.value = '';
            }
        });

        // 영상 로직
        const btnVideo = document.getElementById('btnVideo');
        const recordingModal = document.getElementById('recordingConsentModal');
        const sourceModal = document.getElementById('videoSourceModal');
        const localVideo = document.getElementById('localVideo');
        let analysisTimer = null;
        let _rafRunning = false;
        let _rafCanvas = null, _rafCtx = null;
        let _faceWs = null;      // DeepFace 분석용 WebSocket
        let _signalWs = null;    // WebRTC 시그널링용 WebSocket
        let _pc = null;          // RTCPeerConnection

        btnVideo.addEventListener('click', () => {
            if (btnVideo.classList.contains('on')) stopVideo();
            else if (!_consentShown) {
                // 동의창 안 봤으면 동의창 먼저
                showConsentModalOnce();
            } else if (document.getElementById('consentVideo') && document.getElementById('consentVideo').checked) {
                // 영상 동의 했으면 바로 소스 선택
                sourceModal.classList.add('show');
            } else {
                // 영상 미동의 → 안내
                alert('영상 녹화 동의를 하지 않으셨습니다. 동의창에서 영상 녹화 항목을 체크해주세요.');
            }
        });

        // ── 동의창 1회 표시 플래그 ──
        let _consentShown = false;
        function showConsentModalOnce() {
            if (_consentShown) return;
            _consentShown = true;
            // 체크박스 초기화
            document.getElementById('consentChat').checked = false;
            document.getElementById('consentVideo').checked = false;
            document.getElementById('recordingConsentConfirm').disabled = true;
            document.getElementById('recordingConsentConfirm').style.opacity = '0.5';
            recordingModal.classList.add('show');
        }

        // 필수 체크박스(채팅 저장) 체크 시 확인 버튼 활성화
        document.getElementById('consentChat').addEventListener('change', function() {
            const btn = document.getElementById('recordingConsentConfirm');
            btn.disabled = !this.checked;
            btn.style.opacity = this.checked ? '1' : '0.5';
        });

        document.getElementById('recordingConsentConfirm').addEventListener('click', async () => {
            const videoConsented = document.getElementById('consentVideo').checked;
            recordingModal.classList.remove('show');

            // ── ok_text / ok_face 서버에 저장 ──
            if (windowSessId) {
                try {
                    const baseUrl = API_BASE_URL;
                    await fetch(`${baseUrl}/sessions/${windowSessId}/consent`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ok_text: true, ok_face: videoConsented })
                    });
                } catch(e) { console.error('consent 저장 실패:', e); }
            }

            if (videoConsented) {
                // 영상 동의 → 소스 선택 모달
                sourceModal.classList.add('show');
            }
            // 영상 미동의 → 그냥 닫힘 (채팅만)
        });

        document.getElementById('btnSelectWebcam').addEventListener('click', () => {
            sourceModal.classList.remove('show');
            
            // 1. 브라우저가 카메라 API를 지원하는지 (보안 환경인지) 확인
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                alert("웹캠 기능을 사용할 수 없는 환경입니다.\n(원인: 브라우저 주소창이 http://127.0.0.1 이거나 https 환경인지 확인해주세요.)");
                return;
            }

            // 2. 카메라 호출 및 에러 원인 분석
            navigator.mediaDevices.getUserMedia({ video: true })
                .then(stream => {
                    localVideo.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:320px;height:240px;pointer-events:none;';
                    localVideo.srcObject = stream;
                    localVideo.play().catch(() => {});
                    onVideoStart(stream);
                })
                .catch(err => {
                    console.error("웹캠 연결 에러:", err);
                    if (err.name === 'NotAllowedError') {
                        alert("카메라 권한이 차단되었습니다.\n주소창 왼쪽의 '자물쇠' 아이콘을 눌러 카메라 권한을 '허용'으로 변경해주세요.");
                    } else if (err.name === 'NotFoundError') {
                        alert("연결된 카메라 장치를 찾을 수 없습니다.\n카메라가 컴퓨터에 잘 연결되어 있는지 확인해주세요.");
                    } else if (err.name === 'NotReadableError') {
                        alert("카메라를 불러올 수 없습니다.\n줌(Zoom)이나 다른 프로그램이 카메라를 이미 사용 중인지 확인하고 종료해주세요.");
                    } else {
                        alert("웹캠 로드 실패: " + err.message);
                    }
                });
        });

        document.getElementById('btnSelectFile').addEventListener('click', () => {
            sourceModal.classList.remove('show');
            document.getElementById('videoFileInput').click();
        });

        document.getElementById('videoFileInput').addEventListener('change', function() {
            if (this.files[0]) {
                localVideo.src = URL.createObjectURL(this.files[0]);
                localVideo.loop = true;
                localVideo.style.cssText = 'position:fixed;left:-9999px;top:-9999px;width:320px;height:240px;pointer-events:none;';
                localVideo.oncanplay = () => {
                    localVideo.play().catch(() => {});
                    // 파일 영상: captureStream으로 MediaStream 생성
                    const stream = localVideo.captureStream ? localVideo.captureStream(30) : null;
                    onVideoStart(stream);
                    localVideo.oncanplay = null;
                };
            }
        });

        // ── DeepFace 분석용 WebSocket ──
        function openFaceWs() {
            if (_faceWs && _faceWs.readyState <= 1) return;
            const protocol = API_BASE_URL.startsWith('https') ? 'wss' : 'ws';
            const wsHost = API_BASE_URL.replace(/^https?:\/\//, '');
            _faceWs = new WebSocket(`${protocol}://${wsHost}/ws/analyze/${windowSessId}`);
            _faceWs.onerror = () => { _faceWs = null; };
            _faceWs.onclose = () => { _faceWs = null; };
        }
        function closeFaceWs() {
            if (_faceWs) { try { _faceWs.close(); } catch(e) {} _faceWs = null; }
        }

        // ── WebRTC 시그널링 ──
        function openSignalWs(onOpen) {
            const protocol = API_BASE_URL.startsWith('https') ? 'wss' : 'ws';
            const wsHost = API_BASE_URL.replace(/^https?:\/\//, '');
            _signalWs = new WebSocket(`${protocol}://${wsHost}/ws/signal/${windowSessId}/client`);
            _signalWs.onopen = onOpen;
            _signalWs.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                if (!_pc) return;
                if (msg.type === 'answer') {
                    await _pc.setRemoteDescription(new RTCSessionDescription(msg));
                } else if (msg.type === 'candidate' && msg.candidate) {
                    try { await _pc.addIceCandidate(new RTCIceCandidate(msg.candidate)); } catch(_) {}
                }
            };
            _signalWs.onerror = () => { _signalWs = null; };
            _signalWs.onclose = () => { _signalWs = null; };
        }

        async function startWebRTC(stream) {
            if (!stream) return; // captureStream 미지원 브라우저면 WebRTC 스킵
            _pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
            stream.getTracks().forEach(t => _pc.addTrack(t, stream));
            _pc.onicecandidate = (e) => {
                if (e.candidate && _signalWs && _signalWs.readyState === WebSocket.OPEN) {
                    _signalWs.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
                }
            };
            openSignalWs(async () => {
                const offer = await _pc.createOffer();
                await _pc.setLocalDescription(offer);
                _signalWs.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
            });
        }

        function stopWebRTC() {
            if (_pc) { _pc.close(); _pc = null; }
            if (_signalWs) { try { _signalWs.close(); } catch(_) {} _signalWs = null; }
        }

        // ── 영상 시작/종료 ──
        function onVideoStart(stream) {
            document.getElementById('videoActiveBar').style.display = 'flex';
            btnVideo.classList.add('on');
            btnVideo.style.color = '#E5C76B';
            // WebRTC: 영상 P2P 전송
            startWebRTC(stream);
            // DeepFace: 분석용 캔버스 캡처 (별도)
            openFaceWs();
            _rafRunning = true;
            _rafCanvas = document.createElement('canvas');
            _rafCanvas.width = 320; _rafCanvas.height = 240;
            _rafCtx = _rafCanvas.getContext('2d');
            analysisTimer = setInterval(captureAndSend, 1000); // 분석은 1초마다
        }

        function stopVideo() {
            if (localVideo.srcObject) localVideo.srcObject.getTracks().forEach(t => t.stop());
            localVideo.srcObject = null; localVideo.src = '';
            localVideo.style.cssText = 'display:none;position:absolute;width:0;height:0;';
            document.getElementById('videoActiveBar').style.display = 'none';
            btnVideo.classList.remove('on');
            btnVideo.style.color = '';
            _rafRunning = false;
            clearInterval(analysisTimer);
            analysisTimer = null;
            stopWebRTC();
            closeFaceWs();
        }

        // DeepFace 분석용 캡처 (1초마다, 영상 전송과 완전 분리)
        function captureAndSend() {
            if (!_rafRunning) return;
            if (!windowSessId) return;
            if (!_faceWs || _faceWs.readyState !== WebSocket.OPEN) { openFaceWs(); return; }
            if (!localVideo.videoWidth) return;
            if (_faceWs.bufferedAmount > 64000) return;
            try {
                _rafCtx.drawImage(localVideo, 0, 0, 320, 240);
                const b64 = _rafCanvas.toDataURL('image/jpeg', 0.8).split(',')[1];
                _faceWs.send(JSON.stringify({
                    image_base64: 'data:image/jpeg;base64,' + b64,
                    sess_db_id: windowSessId
                }));
            } catch(e) { _faceWs = null; }
        }

        document.getElementById('btnSend').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        
        // ── 상담 종료 로직 ──
        let _selectedSat = null;  // null / 0 / 1

        // 종료 버튼 → 모달 열기
        document.querySelector('.btn-end-session').addEventListener('click', () => {
            _selectedSat = null;
            resetSatButtons();
            document.getElementById('endSessionModal').classList.add('show');
        });

        // 취소 버튼
        document.getElementById('endSessionCancel').addEventListener('click', () => {
            document.getElementById('endSessionModal').classList.remove('show');
        });

        // 만족도 선택
        function selectSat(val, btn) {
            _selectedSat = val;
            resetSatButtons();
            btn.style.borderColor = val === 1 ? '#4caf50' : '#e05252';
            btn.style.background  = val === 1 ? '#e8f5e9' : '#fce4ec';
            // 확인 버튼 활성화
            const confirmBtn = document.getElementById('endSessionConfirm');
            confirmBtn.disabled = false;
            confirmBtn.style.opacity = '1';
            confirmBtn.style.cursor  = 'pointer';
        }

        function resetSatButtons() {
            ['endSessionSatisfy','endSessionDissatisfy'].forEach(id => {
                const b = document.getElementById(id);
                b.style.borderColor = '#e0e4f0';
                b.style.background  = '#fff';
            });
        }

        // 확인 버튼 → close API + sat_note 같이 전송
        document.getElementById('endSessionConfirm').addEventListener('click', async () => {
            if (_selectedSat === null) return;
            await closeSession(_selectedSat);
        });

async function closeSession(satScore, endReason = 'NORMAL') {
            const baseUrl = API_BASE_URL;
            const satNote = (document.getElementById('thankYouOneLine')?.value || '').trim();
            
            try {
                // 1. 서버에 종료 요청 및 만족도 데이터 전송 (await로 완료 대기)
                const response = await fetch(`${baseUrl}/sessions/${windowSessId}/close`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        end_reason: endReason,
                        sat: satScore,
                        sat_note: satNote || null
                    })
                });

                if (response.ok) {
                    // 2. 저장이 확인되면 안내 메시지 후 이동
                    alert("상담이 안전하게 종료되었습니다.");
                }
            } catch (e) {
                console.error("세션 종료 실패:", e);
                // 네트워크 오류 등이 발생해도 일단 페이지는 이동시킵니다.
            }

            // 3. 상태 업데이트 및 타이머 정리
            _sessionClosed = true;
            if (_heartbeatTimer) { clearInterval(_heartbeatTimer); _heartbeatTimer = null; }
            
            document.getElementById('endSessionModal').classList.remove('show');

            // 4. [수정] 이동 경로를 Landing.html로 명확히 지정 (404 방지)
            location.href = 'Landing.html'; 
        }

        // ── 창 강제 종료 감지: Heartbeat 방식 ──
        // 5초마다 서버에 ping → 15초 이상 없으면 서버가 자동 DROPOUT 처리
        let _sessionClosed = false;
        let _heartbeatTimer = null;

        function startHeartbeat() {
            if (_heartbeatTimer) return;
            _heartbeatTimer = setInterval(() => {
                if (_sessionClosed || !windowSessId) {
                    clearInterval(_heartbeatTimer);
                    return;
                }
                const baseUrl = API_BASE_URL;
                fetch(`${baseUrl}/sessions/${windowSessId}/heartbeat`, { method: 'POST' }).catch(() => {});
            }, 5000);
        }

        // ── 탭/브라우저 닫기 감지 ──
        // beforeunload 시 beacon으로 즉시 DROPOUT 전송
        // - 탭 닫기 / 브라우저 닫기: beacon 전송 → DROPOUT 확정
        // - 새로고침: beacon 전송 후 → 페이지 로드 시 reactivate로 복구
        // - 인터넷 끊김: beacon 전송 불가 → 세션 그대로 유지 (heartbeat 자동종료 없음)
        window.addEventListener('beforeunload', () => {
            if (_sessionClosed || !windowSessId) return;
            sessionStorage.setItem('mw_refreshing', '1');
            sessionStorage.setItem('mw_sess_id', String(windowSessId));
            const baseUrl = API_BASE_URL;
            navigator.sendBeacon(
                `${baseUrl}/sessions/${windowSessId}/close`,
                new Blob([JSON.stringify({ end_reason: 'DROPOUT', sat: null, sat_note: null })],
                         { type: 'application/json' })
            );
        });



        // ── 고민 유형 선택 모달 로직 ──
        let _topicList = [];          // DB에서 불러온 전체 topic 목록
        let _selectedTopics = [];     // 선택된 topic id 배열
        let _etcTopicId = null;       // '기타' topic의 id (있으면)

        async function loadAndShowTopicModal() {
            const baseUrl = API_BASE_URL;
            try {
                const res = await fetch(`${baseUrl}/topics`);
                const data = await res.json();
                _topicList = data.items || [];
            } catch (e) {
                console.error('topic 목록 로드 실패:', e);
                _topicList = [];
            }
            renderTopicGrid();
            document.getElementById('topicSelectModal').classList.add('show');
        }

        function renderTopicGrid() {
            const grid = document.getElementById('topicSelectGrid');
            grid.innerHTML = '';
            _topicList.forEach(topic => {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'topic-chip';
                chip.dataset.id = topic.id;
                chip.dataset.code = topic.code || '';
                chip.textContent = topic.name;
                chip.addEventListener('click', () => onTopicChipClick(chip, topic));
                grid.appendChild(chip);
            });
        }

        function onTopicChipClick(chip, topic) {
            const id = topic.id;
            const isEtc = (topic.code || '').toUpperCase() === 'ETC' || topic.name === '기타';
            if (chip.classList.contains('selected')) {
                // 선택 해제
                chip.classList.remove('selected');
                _selectedTopics = _selectedTopics.filter(t => t !== id);
                if (isEtc) _etcTopicId = null;
            } else {
                if (_selectedTopics.length >= 3) return; // 최대 3개
                if (isEtc) {
                    // 기타 선택 시 입력 모달 열기
                    _etcTopicId = id;
                    document.getElementById('topicEtcModal').classList.add('show');
                    return;
                }
                chip.classList.add('selected');
                _selectedTopics.push(id);
            }
            updateTopicUI();
        }

        function updateTopicUI() {
            const cnt = _selectedTopics.length;
            document.getElementById('topicSelectedCount').textContent = `${cnt}개 선택됨 (최대 3개)`;
            document.getElementById('topicModalComplete').disabled = cnt === 0;
            // 최대 3개 도달 시 미선택 chip 비활성
            document.querySelectorAll('.topic-chip:not(.selected)').forEach(c => {
                c.classList.toggle('disabled', cnt >= 3);
            });
        }

        // 기타 모달 확인
        document.getElementById('topicEtcConfirm').addEventListener('click', () => {
            const val = document.getElementById('topicEtcInput').value.trim();
            if (!val) { alert('내용을 입력해주세요.'); return; }
            if (_etcTopicId && !_selectedTopics.includes(_etcTopicId)) {
                _selectedTopics.push(_etcTopicId);
                // grid에서 기타 chip 선택 표시
                const etcChip = document.querySelector(`.topic-chip[data-id="${_etcTopicId}"]`);
                if (etcChip) etcChip.classList.add('selected');
            }
            document.getElementById('topicEtcModal').classList.remove('show');
            updateTopicUI();
        });
        document.getElementById('topicEtcCancel').addEventListener('click', () => {
            _etcTopicId = null;
            document.getElementById('topicEtcInput').value = '';
            document.getElementById('topicEtcModal').classList.remove('show');
        });

        // 닫기 버튼 (건너뛰기)
        document.getElementById('topicModalClose').addEventListener('click', () => {
            document.getElementById('topicSelectModal').classList.remove('show');
            showConsentModalOnce();
        });

        // 완료 버튼
        document.getElementById('topicModalComplete').addEventListener('click', async () => {
            if (_selectedTopics.length === 0) return;
            const baseUrl = API_BASE_URL;
            try {
                await fetch(`${baseUrl}/sessions/${windowSessId}/topics`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ topic_ids: _selectedTopics })
                });
            } catch (e) {
                console.error('topic 저장 실패:', e);
            }
            document.getElementById('topicSelectModal').classList.remove('show');
            showConsentModalOnce();
        });

        document.addEventListener("DOMContentLoaded", async () => {
            const isRefresh   = sessionStorage.getItem('mw_refreshing');
            const savedSessId = sessionStorage.getItem('mw_sess_id');

            // 플래그 즉시 제거
            sessionStorage.removeItem('mw_refreshing');

            if (isRefresh && savedSessId) {
                // ── 새로고침 → reactivate로 DROPOUT 취소 후 세션 복구 ──
                const baseUrl = API_BASE_URL;
                try {
                    await fetch(`${baseUrl}/sessions/${savedSessId}/reactivate`, { method: 'POST' });
                } catch (e) { console.warn('reactivate 실패:', e); }

                windowSessId = savedSessId;
                document.getElementById('headerSessionId').innerText = `SESS-${savedSessId} · 상담 진행 중`;
                setInterval(fetchMessages, 2000);
                startHeartbeat();
                // 고민 유형 모달은 이미 선택했으므로 스킵
            } else {
                // ── 최초 접속 / 탭 닫고 재접속 → 새 세션 생성 ──
                sessionStorage.removeItem('mw_sess_id');
                await initSession();
            }
        });
    </script>
</body>
</html>
