<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindWay - 더 나은 상담을 위한 여정</title>
    <script src="config.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; }
        body { background: #373f50; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero { max-width: 800px; padding: 40px; }
        .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 4rem; letter-spacing: 0.4em; color: #E5C76B; margin-bottom: 20px; text-transform: uppercase; }
        .hero-tagline { font-size: 1.5rem; opacity: 0.8; margin-bottom: 40px; font-weight: 300; }
        .btn-group { display: flex; gap: 20px; justify-content: center; }
        .btn { padding: 18px 40px; border-radius: 12px; font-size: 1.1rem; font-weight: 600; text-decoration: none; transition: all 0.3s; cursor: pointer; }
        .btn-counselor { background: #7389f4; color: white; }
        .btn-client { border: 2px solid #E5C76B; color: #E5C76B; }
        .btn:hover { transform: translateY(-3px); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 class="brand-name">MindWay</h1>
        <p class="hero-tagline">AI와 함께하는 비대면 상담 분석 솔루션</p>
        <div class="btn-group">
            <a href="Login_counselor.html" class="btn btn-counselor">상담사 시작하기</a>
            <a href="Login_client.html" class="btn btn-client">내담자 시작하기</a>
        </div>
    </div>
</body>
</html>
